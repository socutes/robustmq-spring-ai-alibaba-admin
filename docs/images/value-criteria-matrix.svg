  <text x="224" y="252" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">AI能列方案不能拍板</text>
  <rect x="380" y="206" width="190" height="90" fill="#fff" stroke="#8B5CF6" rx="8" stroke-width="1.5" />
  <circle cx="402" cy="251" r="14" fill="#8B5CF6" />
  <text x="402" y="256" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
