  <line x1="28" y1="159" x2="502" y2="159" stroke="#EEE" stroke-width="1" />
  <text x="142" y="175" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">一任务自己写一半 AI 写一半</text>
  <line x1="265" y1="159" x2="265" y2="197" stroke="#DDD" stroke-width="1" />
  <text x="387" y="175" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 一任务要么完全 AI 写，要么是 review 任务</text>
  <rect x="530" y="137" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="530" y="137" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
  <rect x="775" y="137" width="245" height="60" fill="#fff" rx="0" />
  <rect x="775" y="137" width="245" height="60" fill="#F0FFF0" rx="6" stroke="#52B366" stroke-width="1" />
  <rect x="530" y="137" width="245" height="60" fill="#fff" rx="0" />
  <text x="775" y="153" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#C00" text-anchor="middle">✗ 写完不 Review</text>
  <line x1="538" y1="159" x2="1012" y2="159" stroke="#EEE" stroke-width="1" />
  <text x="652" y="175" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">CI 绿了直接合，review 是走形式</text>
  <line x1="775" y1="159" x2="775" y2="197" stroke="#DDD" stroke-width="1" />
  <text x="897" y="175" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ review 是训练判断力，空 Approval 不算</text>
  <rect x="20" y="209" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="20" y="209" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
