  <text x="78" y="236" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">架构决策，模块划分</text>
  <rect x="56" y="258" width="348" height="44" fill="#fff" stroke="#B0CCE8" rx="6" stroke-width="1" />
