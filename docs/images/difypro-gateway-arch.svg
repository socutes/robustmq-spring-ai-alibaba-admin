<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <rect width="960" height="520" fill="white" />
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333333">LLM Gateway 架构</text>
  <rect x="240" y="50" width="120" height="50" fill="#F0E6FF" stroke="#9B59B6" stroke-width="2" rx="6" />
  <text x="300" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B2C8D" font-weight="bold">Dify 应用 A</text>
  <rect x="420" y="50" width="120" height="50" fill="#F0E6FF" stroke="#9B59B6" stroke-width="2" rx="6" />
  <text x="480" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B2C8D" font-weight="bold">Dify 应用 B</text>
  <rect x="600" y="50" width="120" height="50" fill="#F0E6FF" stroke="#9B59B6" stroke-width="2" rx="6" />
  <text x="660" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B2C8D" font-weight="bold">Dify 应用 C</text>
  <line x1="480" y1="102" x2="480" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />
  <text x="488" y="122" font-family="Arial, sans-serif" font-size="11" fill="#666">模型调用请求</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  <rect x="40" y="140" width="780" height="150" fill="#FFF3E0" stroke="#E67E22" stroke-width="2.5" rx="8" />
  <text x="50" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#B7601E">LLM Gateway（DifyPro 中间层）</text>
  <rect x="50" y="168" width="160" height="110" fill="white" stroke="#E67E22" stroke-width="1.5" rx="4" />
  <text x="130" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B7601E">路由模块</text>
  <text x="130" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">规则路由</text>
  <text x="130" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">按应用/角色/复杂度</text>
  <text x="130" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">选择目标模型</text>
  <rect x="250" y="168" width="160" height="110" fill="white" stroke="#E67E22" stroke-width="1.5" rx="4" />
  <text x="330" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B7601E">限流模块</text>
  <text x="330" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">请求限流</text>
  <text x="330" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">按应用/用户/全局</text>
  <text x="330" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">QPS 上限</text>
  <rect x="450" y="168" width="160" height="110" fill="white" stroke="#E67E22" stroke-width="1.5" rx="4" />
  <text x="530" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B7601E">熔断模块</text>
  <text x="530" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">熔断降级</text>
  <text x="530" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">主模型异常时</text>
  <text x="530" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">自动切备用</text>
  <rect x="650" y="168" width="160" height="110" fill="white" stroke="#E67E22" stroke-width="1.5" rx="4" />
  <text x="730" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B7601E">追踪模块</text>
  <text x="730" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Token 追踪</text>
  <text x="730" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">记录每次调用</text>
  <text x="730" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">推送额度模块</text>
  <line x1="480" y1="292" x2="480" y2="322" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />
  <text x="488" y="312" font-family="Arial, sans-serif" font-size="11" fill="#666">路由后请求</text>
  <rect x="210" y="332" width="140" height="60" fill="#E8F5E9" stroke="#27AE60" stroke-width="2" rx="6" />
  <text x="280" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A7A40">主模型</text>
  <text x="280" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">（GPT-4 / Qwen）</text>
  <rect x="410" y="332" width="140" height="60" fill="#E8F5E9" stroke="#27AE60" stroke-width="2" rx="6" />
  <text x="480" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A7A40">备用模型</text>
  <text x="480" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">（GPT-3.5 / Qwen-turbo）</text>
  <rect x="610" y="332" width="140" height="60" fill="#E8F5E9" stroke="#27AE60" stroke-width="2" rx="6" />
  <text x="680" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A7A40">低成本模型</text>
  <text x="680" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">（简单问答专用）</text>
  <rect x="840" y="140" width="108" height="150" fill="#E3F2FD" stroke="#2196F3" stroke-width="1.5" rx="6" />
  <text x="894" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D47A1">管理台实时展示</text>
  <text x="894" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0">熔断状态 ●</text>
  <text x="894" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0">QPS 统计</text>
  <text x="894" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0">Token 消耗</text>
  <line x1="820" y1="215" x2="840" y2="215" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="5,4" />
</svg>