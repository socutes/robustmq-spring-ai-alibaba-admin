<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      text { font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; }
      .layer-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; fill: #8b949e; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-sub { font-size: 11px; fill: #b0bec5; }
      .box-tag { font-size: 10px; fill: #78909c; font-style: italic; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a6580"/>
    </marker>
    <marker id="arr-be" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3a6a4a"/>
    </marker>
    <marker id="arr-ext" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6a5a2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="#0d1117"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#e6edf3">Spring AI Alibaba Admin — Architecture Overview</text>
  <text x="700" y="58" text-anchor="middle" font-size="11" fill="#8b949e">Service-level · 4 layers · dark theme</text>

  <!-- ══════════ LAYER 1: FRONTEND ══════════ -->
  <rect x="40" y="75" width="1320" height="175" rx="10" fill="#0f1e35" stroke="#1e4080" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="96" class="layer-label">🖥  FRONTEND — Browser (UMI + React)</text>

  <!-- FE 1 -->
  <rect x="60" y="106" width="380" height="124" rx="8" fill="#132240" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="250" y="129" text-anchor="middle" class="box-title" fill="#82b4f7">Legacy Admin</text>
  <text x="250" y="150" text-anchor="middle" class="box-sub">Prompt 工程 / 评测 / 实验管理</text>
  <text x="250" y="167" text-anchor="middle" class="box-sub">版本历史 / Playground / Tracing</text>
  <text x="250" y="191" text-anchor="middle" class="box-tag">HashRouter · legacy/pages/ · Ant Design dark</text>

  <!-- FE 2 -->
  <rect x="510" y="106" width="380" height="124" rx="8" fill="#132240" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="700" y="129" text-anchor="middle" class="box-title" fill="#82b4f7">Agent Studio</text>
  <text x="700" y="150" text-anchor="middle" class="box-sub">应用 / 知识库 / MCP Server</text>
  <text x="700" y="167" text-anchor="middle" class="box-sub">组件 / Agent Schema / 设置</text>
  <text x="700" y="191" text-anchor="middle" class="box-tag">UMI 路由 · src/pages/ · SideMenuLayout · i18n</text>

  <!-- FE 3 -->
  <rect x="960" y="106" width="380" height="124" rx="8" fill="#132240" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="1150" y="129" text-anchor="middle" class="box-title" fill="#82b4f7">Overview Dashboard</text>
  <text x="1150" y="150" text-anchor="middle" class="box-sub">指标卡 / 实验状态图 / 版本分布</text>
  <text x="1150" y="167" text-anchor="middle" class="box-sub">最近活动时间线</text>
  <text x="1150" y="191" text-anchor="middle" class="box-tag">/admin/overview · GET /api/dashboard/overview</text>

  <!-- FE → BE arrow -->
  <line x1="700" y1="252" x2="700" y2="280" stroke="#4a6580" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <text x="716" y="270" font-size="10" fill="#546e7a">HTTP / REST · JWT Auth</text>

  <!-- ══════════ LAYER 2: BACKEND ══════════ -->
  <rect x="40" y="286" width="1320" height="175" rx="10" fill="#0d1f12" stroke="#1a4d2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="307" class="layer-label">⚙️  BACKEND — Spring Boot 3.3.6 · Maven Multi-Module</text>

  <!-- BE 1 -->
  <rect x="60" y="316" width="290" height="124" rx="8" fill="#122018" stroke="#4ade80" stroke-width="1.5"/>
  <text x="205" y="339" text-anchor="middle" class="box-title" fill="#86efac">server-start</text>
  <text x="205" y="359" text-anchor="middle" class="box-sub">Spring Boot 启动入口</text>
  <text x="205" y="376" text-anchor="middle" class="box-sub">配置文件 / 静态资源托管</text>
  <text x="205" y="421" text-anchor="middle" class="box-tag">application.yml · model-config.yaml</text>

  <!-- BE 2 -->
  <rect x="385" y="316" width="290" height="124" rx="8" fill="#122018" stroke="#4ade80" stroke-width="1.5"/>
  <text x="530" y="339" text-anchor="middle" class="box-title" fill="#86efac">server-core</text>
  <text x="530" y="359" text-anchor="middle" class="box-sub">业务核心：Service / Domain</text>
  <text x="530" y="376" text-anchor="middle" class="box-sub">Spring AI Alibaba 集成</text>
  <text x="530" y="393" text-anchor="middle" class="box-sub">GraalVM 脚本执行 (JS/Python)</text>
  <text x="530" y="421" text-anchor="middle" class="box-tag">ChatClient · Evaluator · Experiment Engine</text>

  <!-- BE 3 -->
  <rect x="710" y="316" width="290" height="124" rx="8" fill="#122018" stroke="#4ade80" stroke-width="1.5"/>
  <text x="855" y="339" text-anchor="middle" class="box-title" fill="#86efac">server-openapi</text>
  <text x="855" y="359" text-anchor="middle" class="box-sub">外部 Agent 对话接口</text>
  <text x="855" y="376" text-anchor="middle" class="box-sub">标准 REST OpenAPI</text>
  <text x="855" y="421" text-anchor="middle" class="box-tag">/api/v1/apps/workflow/ · 供外部调用</text>

  <!-- BE 4 -->
  <rect x="1035" y="316" width="305" height="124" rx="8" fill="#122018" stroke="#4ade80" stroke-width="1.5"/>
  <text x="1187" y="339" text-anchor="middle" class="box-title" fill="#86efac">server-runtime</text>
  <text x="1187" y="359" text-anchor="middle" class="box-sub">基础设施层封装</text>
  <text x="1187" y="376" text-anchor="middle" class="box-sub">MyBatis-Plus / Redisson / ES 客户端</text>
  <text x="1187" y="393" text-anchor="middle" class="box-sub">无业务逻辑，纯 Infra</text>
  <text x="1187" y="421" text-anchor="middle" class="box-tag">agentscope Mapper · Result&lt;T&gt; · PageResult</text>

  <!-- BE internal arrows -->
  <line x1="352" y1="378" x2="383" y2="378" stroke="#3a6a4a" stroke-width="1.2" marker-end="url(#arr-be)"/>
  <line x1="677" y1="378" x2="708" y2="378" stroke="#3a6a4a" stroke-width="1.2" marker-end="url(#arr-be)"/>
  <line x1="855" y1="440" x2="855" y2="458" stroke="#3a6a4a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="855" y1="458" x2="530" y2="458" stroke="#3a6a4a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="530" y1="458" x2="530" y2="442" stroke="#3a6a4a" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr-be)"/>
  <text x="640" y="468" font-size="9" fill="#3a6a4a">depends on</text>

  <!-- BE → DB arrow -->
  <line x1="700" y1="463" x2="700" y2="491" stroke="#4a6580" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <text x="716" y="481" font-size="10" fill="#546e7a">JPA / MyBatis-Plus / Redisson</text>

  <!-- ══════════ LAYER 3: DATA ══════════ -->
  <rect x="40" y="497" width="1320" height="175" rx="10" fill="#1a0d2e" stroke="#4a1d7a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="518" class="layer-label">🗄  DATA LAYER — Persistent Storage</text>

  <!-- DB 1 -->
  <rect x="60" y="527" width="290" height="124" rx="8" fill="#1e1030" stroke="#c084fc" stroke-width="1.5"/>
  <text x="205" y="550" text-anchor="middle" class="box-title" fill="#d8b4fe">MySQL · admin DB</text>
  <text x="205" y="570" text-anchor="middle" class="box-sub">Prompt / PromptVersion</text>
  <text x="205" y="587" text-anchor="middle" class="box-sub">Dataset / Evaluator / Experiment</text>
  <text x="205" y="631" text-anchor="middle" class="box-tag">JPA @Table · server-core domain 包</text>

  <!-- DB 2 -->
  <rect x="385" y="527" width="290" height="124" rx="8" fill="#1e1030" stroke="#c084fc" stroke-width="1.5"/>
  <text x="530" y="550" text-anchor="middle" class="box-title" fill="#d8b4fe">MySQL · agentscope DB</text>
  <text x="530" y="570" text-anchor="middle" class="box-sub">App / KB / Document / Model</text>
  <text x="530" y="587" text-anchor="middle" class="box-sub">MCP / Account / Plugin / ApiKey</text>
  <text x="530" y="631" text-anchor="middle" class="box-tag">MyBatis-Plus @TableName · server-runtime</text>

  <!-- DB 3 -->
  <rect x="710" y="527" width="290" height="124" rx="8" fill="#1e1030" stroke="#c084fc" stroke-width="1.5"/>
  <text x="855" y="550" text-anchor="middle" class="box-title" fill="#d8b4fe">Redis</text>
  <text x="855" y="570" text-anchor="middle" class="box-sub">Chat Session 缓存 (TTL 控制)</text>
  <text x="855" y="587" text-anchor="middle" class="box-sub">Dashboard Overview 缓存</text>
  <text x="855" y="631" text-anchor="middle" class="box-tag">Redisson · dashboard:overview · TTL 5min</text>

  <!-- DB 4 -->
  <rect x="1035" y="527" width="305" height="124" rx="8" fill="#1e1030" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1187" y="550" text-anchor="middle" class="box-title" fill="#d8b4fe">Elasticsearch</text>
  <text x="1187" y="570" text-anchor="middle" class="box-sub">文档向量块 (DocumentChunk)</text>
  <text x="1187" y="587" text-anchor="middle" class="box-sub">OTel Trace / Span 数据</text>
  <text x="1187" y="631" text-anchor="middle" class="box-tag">Spring AI Vector Store · loongsuite_traces</text>

  <!-- BE → EXT vertical arrows -->
  <line x1="205" y1="463" x2="205" y2="735" stroke="#6a5a2a" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-ext)"/>
  <line x1="530" y1="463" x2="530" y2="735" stroke="#6a5a2a" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-ext)"/>
  <line x1="855" y1="463" x2="855" y2="735" stroke="#6a5a2a" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-ext)"/>
  <line x1="1187" y1="463" x2="1187" y2="735" stroke="#6a5a2a" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-ext)"/>

  <!-- Labels in gap -->
  <text x="220" y="718" font-size="9" fill="#7a6a3a">配置同步</text>
  <text x="545" y="718" font-size="9" fill="#7a6a3a">消息队列</text>
  <text x="870" y="718" font-size="9" fill="#7a6a3a">AI 推理调用</text>
  <text x="1155" y="718" font-size="9" fill="#7a6a3a">Trace 写入</text>

  <!-- ══════════ LAYER 4: EXTERNAL ══════════ -->
  <rect x="40" y="740" width="1320" height="155" rx="10" fill="#1f1a08" stroke="#7a5a14" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="761" class="layer-label">🌐  EXTERNAL SERVICES — Middleware &amp; AI APIs</text>

  <!-- EXT 1 -->
  <rect x="60" y="770" width="290" height="110" rx="8" fill="#2a200a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="205" y="793" text-anchor="middle" class="box-title" fill="#fde68a">Nacos</text>
  <text x="205" y="813" text-anchor="middle" class="box-sub">配置中心 &amp; 服务注册</text>
  <text x="205" y="830" text-anchor="middle" class="box-sub">Prompt 发布后自动同步推送</text>
  <text x="205" y="862" text-anchor="middle" class="box-tag">spring-ai-alibaba-agent-nacos 订阅</text>

  <!-- EXT 2 -->
  <rect x="385" y="770" width="290" height="110" rx="8" fill="#2a200a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="530" y="793" text-anchor="middle" class="box-title" fill="#fde68a">RocketMQ</text>
  <text x="530" y="813" text-anchor="middle" class="box-sub">异步消息队列</text>
  <text x="530" y="830" text-anchor="middle" class="box-sub">文档上传触发向量化索引</text>
  <text x="530" y="862" text-anchor="middle" class="box-tag">分块 → Embedding → ES 写入</text>

  <!-- EXT 3 -->
  <rect x="710" y="770" width="290" height="110" rx="8" fill="#2a200a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="855" y="793" text-anchor="middle" class="box-title" fill="#fde68a">AI Model APIs</text>
  <text x="855" y="813" text-anchor="middle" class="box-sub">DashScope / OpenAI / DeepSeek</text>
  <text x="855" y="830" text-anchor="middle" class="box-sub">LLM 推理 &amp; Embedding 生成</text>
  <text x="855" y="862" text-anchor="middle" class="box-tag">Spring AI ChatClient 驱动</text>

  <!-- EXT 4 -->
  <rect x="1035" y="770" width="305" height="110" rx="8" fill="#2a200a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1187" y="793" text-anchor="middle" class="box-title" fill="#fde68a">OTel Collector → ES</text>
  <text x="1187" y="813" text-anchor="middle" class="box-sub">链路收集 (LoongCollector)</text>
  <text x="1187" y="830" text-anchor="middle" class="box-sub">业务应用 OTLP 上报 Trace</text>
  <text x="1187" y="862" text-anchor="middle" class="box-tag">Admin 从 ES 读取展示，不过 Jaeger</text>

  <!-- ══════════ Legend ══════════ -->
  <rect x="40" y="905" width="1320" height="1" fill="#21262d"/>
  <rect x="470" y="910" width="10" height="10" rx="2" fill="#132240" stroke="#4a9eff" stroke-width="1"/>
  <text x="486" y="920" font-size="10" fill="#8b949e">Frontend</text>
  <rect x="570" y="910" width="10" height="10" rx="2" fill="#122018" stroke="#4ade80" stroke-width="1"/>
  <text x="586" y="920" font-size="10" fill="#8b949e">Backend</text>
  <rect x="670" y="910" width="10" height="10" rx="2" fill="#1e1030" stroke="#c084fc" stroke-width="1"/>
  <text x="686" y="920" font-size="10" fill="#8b949e">Data Layer</text>
  <rect x="790" y="910" width="10" height="10" rx="2" fill="#2a200a" stroke="#fbbf24" stroke-width="1"/>
  <text x="806" y="920" font-size="10" fill="#8b949e">External Services</text>
  <line x1="930" y1="915" x2="960" y2="915" stroke="#4a6580" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="966" y="920" font-size="10" fill="#8b949e">数据流向</text>
</svg>
