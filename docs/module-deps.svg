<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0002"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="760" height="500" fill="#f7f8fc" rx="14"/>

  <!-- title -->
  <text x="380" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">Spring AI Alibaba Admin — 内部模块依赖图</text>
  <text x="380" y="58" text-anchor="middle" font-size="11" fill="#888">箭头方向：A → B 表示 A 依赖 B（compile scope）</text>

  <!-- ─── 父 POM ─────────────────────────────── -->
  <rect x="275" y="78" width="210" height="58" rx="9" fill="#fff" stroke="#90a4ae" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#37474f">spring-ai-alibaba-admin</text>
  <text x="380" y="122" text-anchor="middle" font-size="10" fill="#78909c">父 POM（packaging=pom）</text>
  <text x="380" y="134" text-anchor="middle" font-size="10" fill="#78909c">统一版本 &amp; dependencyManagement</text>

  <!-- parent arrows (thin dashed = inherits) -->
  <line x1="380" y1="136" x2="130"  y2="218" stroke="#b0bec5" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="380" y1="136" x2="300"  y2="218" stroke="#b0bec5" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="380" y1="136" x2="460"  y2="218" stroke="#b0bec5" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="380" y1="136" x2="630"  y2="218" stroke="#b0bec5" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- ─── runtime ────────────────────────────── -->
  <rect x="40" y="218" width="180" height="110" rx="9" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">server-runtime</text>
  <line x1="40" y1="256" x2="220" y2="256" stroke="#a5d6a7" stroke-width="1"/>
  <text x="130" y="272" text-anchor="middle" font-size="10" fill="#2e7d32">共享领域模型 / DTO / VO</text>
  <text x="130" y="286" text-anchor="middle" font-size="10" fill="#2e7d32">枚举常量 / 分页封装</text>
  <text x="130" y="300" text-anchor="middle" font-size="10" fill="#2e7d32">无内部模块依赖</text>
  <text x="130" y="318" text-anchor="middle" font-size="9" fill="#66bb6a" font-style="italic">（叶节点）</text>

  <!-- ─── core ──────────────────────────────── -->
  <rect x="255" y="218" width="200" height="110" rx="9" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="355" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#0d47a1">server-core</text>
  <line x1="255" y1="256" x2="455" y2="256" stroke="#90caf9" stroke-width="1"/>
  <text x="355" y="272" text-anchor="middle" font-size="10" fill="#1565c0">业务核心 / Agent 执行引擎</text>
  <text x="355" y="286" text-anchor="middle" font-size="10" fill="#1565c0">工具回调 / ORM Mapper</text>
  <text x="355" y="300" text-anchor="middle" font-size="10" fill="#1565c0">模型/Redis/OSS 管理器</text>
  <text x="355" y="314" text-anchor="middle" font-size="9" fill="#42a5f5" font-style="italic">depends → runtime</text>

  <!-- ─── openapi ───────────────────────────── -->
  <rect x="490" y="218" width="200" height="110" rx="9" fill="#fff3e0" stroke="#ffa726" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">server-openapi</text>
  <line x1="490" y1="256" x2="690" y2="256" stroke="#ffcc80" stroke-width="1"/>
  <text x="590" y="272" text-anchor="middle" font-size="10" fill="#bf360c">OpenAI 兼容 Chat API</text>
  <text x="590" y="286" text-anchor="middle" font-size="10" fill="#bf360c">ApiKey 鉴权拦截器</text>
  <text x="590" y="300" text-anchor="middle" font-size="10" fill="#bf360c">对外暴露 Agent 调用端点</text>
  <text x="590" y="314" text-anchor="middle" font-size="9" fill="#ffa726" font-style="italic">depends → core</text>

  <!-- ─── start ─────────────────────────────── -->
  <rect x="255" y="380" width="250" height="100" rx="9" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#4a148c">server-start</text>
  <line x1="255" y1="418" x2="505" y2="418" stroke="#ce93d8" stroke-width="1"/>
  <text x="380" y="434" text-anchor="middle" font-size="10" fill="#6a1b9a">应用入口 / Spring Boot 启动类</text>
  <text x="380" y="448" text-anchor="middle" font-size="10" fill="#6a1b9a">全局异常 / JWT 鉴权 / Controller</text>
  <text x="380" y="462" text-anchor="middle" font-size="9" fill="#ab47bc" font-style="italic">depends → core, openapi</text>

  <!-- ─── 依赖箭头 ──────────────────────────── -->

  <!-- core → runtime -->
  <line x1="255" y1="268" x2="220" y2="268" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="224" y="255" width="30" height="14" rx="3" fill="#f7f8fc"/>
  <text x="239" y="266" text-anchor="middle" font-size="9" fill="#555">依赖</text>

  <!-- openapi → core -->
  <line x1="490" y1="268" x2="455" y2="268" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="458" y="255" width="30" height="14" rx="3" fill="#f7f8fc"/>
  <text x="473" y="266" text-anchor="middle" font-size="9" fill="#555">依赖</text>

  <!-- start → core (vertical) -->
  <line x1="355" y1="380" x2="355" y2="328" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="360" y="348" width="30" height="14" rx="3" fill="#f7f8fc"/>
  <text x="375" y="359" text-anchor="middle" font-size="9" fill="#555">依赖</text>

  <!-- start → openapi (diagonal) -->
  <line x1="505" y1="400" x2="590" y2="328" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="545" y="358" width="30" height="14" rx="3" fill="#f7f8fc"/>
  <text x="560" y="369" text-anchor="middle" font-size="9" fill="#555">依赖</text>

  <!-- ─── 传递依赖注释 (start → runtime via core) -->
  <text x="130" y="360" text-anchor="middle" font-size="9" fill="#9e9e9e" font-style="italic">start 通过 core</text>
  <text x="130" y="372" text-anchor="middle" font-size="9" fill="#9e9e9e" font-style="italic">传递依赖 runtime</text>

  <!-- ─── 无循环依赖 badge ──────────────────── -->
  <rect x="560" y="420" width="165" height="42" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="642" y="439" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">✓ 无循环依赖</text>
  <text x="642" y="455" text-anchor="middle" font-size="9" fill="#388e3c">拓扑顺序：runtime → core → openapi → start</text>

  <!-- ─── 图例 ──────────────────────────────── -->
  <rect x="30" y="470" width="440" height="22" rx="5" fill="#eceff1" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="46" y1="481" x2="76" y2="481" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="82" y="485" font-size="9" fill="#555">compile 依赖</text>
  <line x1="150" y1="481" x2="180" y2="481" stroke="#b0bec5" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="186" y="485" font-size="9" fill="#888">parent 继承（虚线）</text>
  <rect x="280" y="472" width="10" height="10" rx="2" fill="#c62828"/>
  <text x="296" y="481" font-size="9" fill="#c62828">红色边 = 循环依赖（本项目中无）</text>
</svg>
