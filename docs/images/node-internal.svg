<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="720" viewBox="0 0 860 720">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="860" height="720" fill="#fafafa" />

  <!-- 最外层大方框：When 节点进程 -->
  <rect x="20" y="20" width="820" height="680" rx="12" ry="12"
        fill="none" stroke="#888" stroke-width="2.5" stroke-dasharray="8,4" />
  <text x="430" y="48" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="16" font-weight="bold" fill="#444">When 节点进程</text>

  <!-- ===== 第一行：HTTP Server + gRPC Server ===== -->
  <!-- HTTP Server -->
  <rect x="60" y="68" width="320" height="72" rx="8" ry="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="220" y="98" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="bold" fill="#1e3a8a">HTTP Server</text>
  <text x="220" y="118" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#1e40af">（对外接入层）</text>

  <!-- gRPC Server -->
  <rect x="480" y="68" width="320" height="72" rx="8" ry="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="640" y="98" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="bold" fill="#1e3a8a">gRPC Server</text>
  <text x="640" y="118" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#1e40af">（节点间通信 / 副本同步）</text>

  <!-- 箭头：HTTP Server → MessageService -->
  <line x1="220" y1="140" x2="220" y2="188" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />
  <line x1="220" y1="180" x2="430" y2="180" stroke="#555" stroke-width="1.8" />

  <!-- 箭头：gRPC Server → MessageService -->
  <line x1="640" y1="140" x2="640" y2="188" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />
  <line x1="640" y1="180" x2="430" y2="180" stroke="#555" stroke-width="1.8" />

  <!-- 竖线汇聚到 MessageService -->
  <line x1="430" y1="180" x2="430" y2="198" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />

  <!-- ===== 第二行：MessageService ===== -->
  <rect x="200" y="198" width="460" height="72" rx="8" ry="8"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" />
  <text x="430" y="228" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="bold" fill="#064e3b">消息服务层 — MessageService</text>
  <text x="430" y="248" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#065f46">（写入 / 取消 / 查询）</text>

  <!-- 箭头：MessageService → TimingWheelMgr（左下） -->
  <line x1="350" y1="270" x2="350" y2="310" stroke="#555" stroke-width="1.8" />
  <line x1="350" y1="310" x2="240" y2="310" stroke="#555" stroke-width="1.8" />
  <line x1="240" y1="310" x2="240" y2="338" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />

  <!-- 箭头：MessageService → ReplicationManager（右下） -->
  <line x1="510" y1="270" x2="510" y2="310" stroke="#555" stroke-width="1.8" />
  <line x1="510" y1="310" x2="620" y2="310" stroke="#555" stroke-width="1.8" />
  <line x1="620" y1="310" x2="620" y2="338" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />

  <!-- ===== 第三行：TimingWheelMgr + ReplicationManager ===== -->
  <!-- TimingWheelMgr -->
  <rect x="60" y="338" width="360" height="80" rx="8" ry="8"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="240" y="368" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="bold" fill="#78350f">时间轮调度引擎 — TimingWheelMgr</text>
  <text x="240" y="388" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#92400e">（多层时间轮调度）</text>
  <text x="240" y="406" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#92400e"> </text>

  <!-- ReplicationManager -->
  <rect x="440" y="338" width="360" height="80" rx="8" ry="8"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="620" y="368" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="bold" fill="#78350f">副本同步器 — ReplicationManager</text>
  <text x="620" y="388" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#92400e">（Master→Slave 同步）</text>

  <!-- 箭头：TimingWheelMgr → RedisStore -->
  <line x1="240" y1="418" x2="240" y2="456" stroke="#555" stroke-width="1.8" />
  <line x1="240" y1="456" x2="430" y2="456" stroke="#555" stroke-width="1.8" />
  <line x1="430" y1="456" x2="430" y2="468" stroke="#555" stroke-width="1.8"
        marker-end="url(#arrowhead)" />

  <!-- 箭头：ReplicationManager → RedisStore -->
  <line x1="620" y1="418" x2="620" y2="456" stroke="#555" stroke-width="1.8" />
  <line x1="620" y1="456" x2="430" y2="456" stroke="#555" stroke-width="1.8" />

  <!-- ===== 第四行：RedisStore ===== -->
  <rect x="200" y="468" width="460" height="72" rx="8" ry="8"
        fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" />
  <text x="430" y="498" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="bold" fill="#831843">存储层 — RedisStore</text>
  <text x="430" y="518" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#9d174d">（消息持久化 / 索引 / 恢复）</text>

  <!-- ===== 底部两个独立模块 ===== -->
  <!-- 分隔线 -->
  <line x1="40" y1="564" x2="820" y2="564" stroke="#ccc" stroke-width="1"
        stroke-dasharray="4,3" />
  <text x="430" y="580" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#aaa">— 辅助模块（非主数据流）—</text>

  <!-- ClusterCoordinator -->
  <rect x="40" y="590" width="380" height="94" rx="8" ry="8"
        fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" />
  <text x="230" y="618" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="bold" fill="#4c1d95">集群协调模块</text>
  <text x="230" y="638" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#5b21b6">ClusterCoordinator</text>
  <text x="230" y="656" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#6d28d9">（ETCD 注册 / Watch）</text>
  <text x="230" y="674" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#6d28d9">+ ControllerElector（选举）</text>

  <!-- SinkDispatcher -->
  <rect x="440" y="590" width="380" height="94" rx="8" ry="8"
        fill="#ffedd5" stroke="#f97316" stroke-width="1.5" />
  <text x="630" y="618" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="bold" fill="#7c2d12">Sink 投递层</text>
  <text x="630" y="638" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#9a3412">SinkDispatcher（SPI 路由）</text>
  <text x="630" y="656" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#c2410c">HttpSink / KafkaSink / GrpcSink</text>
  <text x="630" y="674" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="10" fill="#c2410c"> </text>

</svg>