  <text x="768" y="194" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">• 各厂内部不开源</text>
  <rect x="766" y="218" width="154" height="24" fill="#F5F5F5" stroke="#DDD" rx="4" stroke-width="1" />
  <text x="843" y="235" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#333" text-anchor="middle">⭐⭐⭐</text>
  <rect x="766" y="252" width="154" height="30" fill="#FFF8E8" stroke="#E09A52" rx="6" stroke-width="1.5" />
