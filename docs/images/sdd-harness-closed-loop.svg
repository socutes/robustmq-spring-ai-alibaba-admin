  <polygon points="430,260 416,253 416,267" fill="#4A90D9" />
  <line x1="420" y1="260" x2="430" y2="260" stroke="#4A90D9" stroke-width="2" />
  <text x="380" y="252" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">目标</text>
  <polygon points="460,260 446,253 446,267" fill="#E09A52" />
  <line x1="450" y1="260" x2="460" y2="260" stroke="#E09A52" stroke-width="2" />
  <text x="456" y="252" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#E09A52" text-anchor="middle">约束</text>
  <rect x="40" y="394" width="800" height="80" fill="#F0F4FF" stroke="#B0C0E0" rx="8" stroke-width="1" />
  <text x="440" y="414" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#1A3A6B" text-anchor="middle">底层假设：AI 不是被信任的，是被工程化使用的</text>
  <text x="440" y="434" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#555" text-anchor="middle">能力极强但缺判断边界 → 需要被精确指挥、严格约束、持续校验</text>
  <text x="440" y="454" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#888" text-anchor="middle">只学 SDD：目标清晰但执行失控 ｜ 只学 Harness：约束严格但目标模糊</text>
</svg>