  <text x="205" y="303" text-anchor="middle" font-size="10" fill="#546e7a">Experiment · ModelConfig · Observability</text>
  <text x="205" y="318" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">Auth interceptor · request/response DTOs</text>

  <!-- server-start -->
  <rect x="376" y="252" width="310" height="82" rx="8" fill="white" stroke="#a5d6a7" stroke-width="1.2" filter="url(#sh)"/>
  <text x="531" y="272" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">server-start</text>
  <text x="531" y="289" text-anchor="middle" font-size="10" fill="#546e7a">Spring Boot entry · OTel auto-config ·</text>
  <text x="531" y="303" text-anchor="middle" font-size="10" fill="#546e7a">Nacos config · model switching (OpenAI /</text>
  <text x="531" y="318" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">DashScope / DeepSeek / Ollama)</text>

