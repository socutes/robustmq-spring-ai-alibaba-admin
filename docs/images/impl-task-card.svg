  <ns0:text x="530" y="50" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">一张卡片 = 一个 PR = 一个 Issue · AI 拿到能直接开工 · 人拿到能直接 Review</ns0:text>
