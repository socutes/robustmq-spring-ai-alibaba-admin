<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="540" viewBox="0 0 1020 540">
  <rect width="1020" height="540" fill="#F8FAFF" />
  <text x="510" y="36" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1A3A6B" text-anchor="middle">AI 时代，路径变了三层</text>
  <text x="510" y="56" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">不只是换了工具——核心动作、能力杠杆、身份认同都变了</text>
  <rect x="30" y="46" width="360" height="28" fill="#E8EEF8" stroke="#C0CCE0" rx="7" stroke-width="1" />
  <text x="210" y="64" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">旧路径</text>
  <rect x="630" y="46" width="360" height="28" fill="#E6F4E6" stroke="#96CC96" rx="7" stroke-width="1" />
  <text x="810" y="64" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2A6A2A" text-anchor="middle">新路径</text>
  <rect x="30" y="82" width="360" height="118" fill="#F4F6FB" stroke="#C8D4E8" rx="8" stroke-width="1.2" />
  <text x="210" y="110" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">写代码</text>
  <text x="210" y="138" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">一行一行手撸</text>
  <text x="210" y="162" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">以产出量衡量好坏</text>
  <rect x="630" y="82" width="360" height="118" fill="#EDF8ED" stroke="#96CC96" rx="8" stroke-width="1.5" />
  <text x="810" y="110" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1A5A1A" text-anchor="middle">驾驭 AI 写代码</text>
  <text x="810" y="138" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">告诉 AI → 检查 → 验收</text>
  <text x="810" y="162" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">核心能力：判断而非手感</text>
  <text x="510" y="123" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#4A90D9" text-anchor="middle">表层 · 核心动作</text>
  <rect x="455" y="139" width="110" height="22" fill="#4A90D9" stroke="none" rx="11" stroke-width="0" />
  <text x="510" y="154" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">手感 → 判断</text>
  <line x1="398" y1="152" x2="447" y2="152" stroke="#BBB" stroke-width="2" />
  <polygon points="447,152 438,147 438,157" fill="#BBB" />
  <line x1="573" y1="152" x2="622" y2="152" stroke="#4A90D9" stroke-width="2" />
  <polygon points="622,152 613,147 613,157" fill="#4A90D9" />
  <rect x="30" y="218" width="360" height="118" fill="#F4F6FB" stroke="#C8D4E8" rx="8" stroke-width="1.2" />
  <text x="210" y="246" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">勤奋 ≈ 产出</text>
  <text x="210" y="274" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">加班 = 更多代码</text>
  <text x="210" y="298" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">时间投入线性回报</text>
  <rect x="630" y="218" width="360" height="118" fill="#EDF8ED" stroke="#96CC96" rx="8" stroke-width="1.5" />
  <text x="810" y="246" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1A5A1A" text-anchor="middle">清晰度 = 产出</text>
  <text x="810" y="274" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">想不清楚，加班也白费</text>
  <text x="810" y="298" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">差距从线性变成指数级</text>
  <text x="510" y="259" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6" text-anchor="middle">中层 · 能力杠杆</text>
  <rect x="455" y="275" width="110" height="22" fill="#8B5CF6" stroke="none" rx="11" stroke-width="0" />
  <text x="510" y="290" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">勤奋 → 清晰度</text>
  <line x1="398" y1="288" x2="447" y2="288" stroke="#BBB" stroke-width="2" />
  <polygon points="447,288 438,283 438,293" fill="#BBB" />
  <line x1="573" y1="288" x2="622" y2="288" stroke="#8B5CF6" stroke-width="2" />
  <polygon points="622,288 613,283 613,293" fill="#8B5CF6" />
  <rect x="30" y="354" width="360" height="118" fill="#F4F6FB" stroke="#C8D4E8" rx="8" stroke-width="1.2" />
  <text x="210" y="382" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">代码生产者</text>
  <text x="210" y="410" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">写好代码完成本分</text>
  <text x="210" y="434" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#777" text-anchor="middle">关心架构与代码质量</text>
  <rect x="630" y="354" width="360" height="118" fill="#EDF8ED" stroke="#96CC96" rx="8" stroke-width="1.5" />
  <text x="810" y="382" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1A5A1A" text-anchor="middle">价值生产者</text>
  <text x="810" y="410" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">定义 + 执行 + 对结果负责</text>
  <text x="810" y="434" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#2A6A2A" text-anchor="middle">关心"这东西真的有用吗"</text>
  <text x="510" y="395" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#E05252" text-anchor="middle">深层 · 身份认同</text>
  <rect x="455" y="411" width="110" height="22" fill="#E05252" stroke="none" rx="11" stroke-width="0" />
  <text x="510" y="426" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">手段 → 目的</text>
  <line x1="398" y1="424" x2="447" y2="424" stroke="#BBB" stroke-width="2" />
  <polygon points="447,424 438,419 438,429" fill="#BBB" />
  <line x1="573" y1="424" x2="622" y2="424" stroke="#E05252" stroke-width="2" />
  <polygon points="622,424 613,419 613,429" fill="#E05252" />
  <text x="510" y="526" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#AAA" text-anchor="middle">这三层变化合起来，是这次 AI 时代和过去任何一次工具迭代最大的不同</text>
</svg>