  <rect x="595" y="244" width="165" height="48" fill="#fff" stroke="#E09A52" rx="4" stroke-width="1" />
  <text x="677" y="260" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#E09A52" text-anchor="middle">XXL-JOB / Quartz</text>
  <text x="677" y="274" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">任务调度平台，</text>
  <text x="677" y="286" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">cron 模式，不匹配</text>
  <rect x="595" y="414" width="165" height="44" fill="#F8F8F8" stroke="#E09A52" rx="4" stroke-width="1" />
  <text x="677" y="430" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">核心边界：核心是 worker 执行任务</text>
  <text x="677" y="445" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">不是"把消息投到任意下游"</text>
