  <text x="654" y="610" text-anchor="middle" font-size="10" fill="#546e7a">OTLP endpoint</text>
  <text x="654" y="625" text-anchor="middle" font-size="10" fill="#546e7a">→ ES pipeline</text>
  <text x="654" y="641" text-anchor="middle" font-size="10" fill="#78909c">:4318</text>

  <!-- ════════════════════════════════════════════════════
       LAYER 4 — DATABASE  (y 706 – 800)
  ════════════════════════════════════════════════════ -->
