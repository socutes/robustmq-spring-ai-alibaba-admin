<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#4a4a4a"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d32f2f"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#aaa"/>
    </marker>
    <filter id="drop" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="580" rx="14" fill="#f5f6fa"/>

  <!-- title -->
  <text x="450" y="42" text-anchor="middle" font-size="19" font-weight="700" fill="#1a237e">Spring AI Alibaba Admin — Module Dependency Graph</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#78909c">Internal modules only · arrow: A → B means A depends on B</text>

  <!-- ── ROOT POM ── -->
  <g filter="url(#drop)">
    <rect x="300" y="90" width="300" height="56" rx="10" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
  </g>
  <text x="450" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1a237e">spring-ai-alibaba-admin</text>
  <text x="450" y="133" text-anchor="middle" font-size="11" fill="#5c6bc0">root POM · packaging=pom · v1.0.0-SNAPSHOT</text>

  <!-- ── server-start ── -->
  <g filter="url(#drop)">
    <rect x="30" y="230" width="230" height="56" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  </g>
  <text x="145" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#0d47a1">server-start</text>
  <text x="145" y="273" text-anchor="middle" font-size="11" fill="#1565c0">Spring Boot entry point</text>

  <!-- ── server-openapi ── -->
  <g filter="url(#drop)">
    <rect x="635" y="230" width="230" height="56" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  </g>
  <text x="750" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">server-openapi</text>
  <text x="750" y="273" text-anchor="middle" font-size="11" fill="#2e7d32">REST API definitions</text>

  <!-- ── server-core ── -->
  <g filter="url(#drop)">
    <rect x="300" y="380" width="300" height="56" rx="10" fill="#fff8e1" stroke="#ef6c00" stroke-width="2"/>
  </g>
  <text x="450" y="405" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">server-core</text>
  <text x="450" y="423" text-anchor="middle" font-size="11" fill="#ef6c00">Shared business logic · DB · AI</text>

  <!-- ── server-runtime ── -->
  <g filter="url(#drop)">
    <rect x="300" y="490" width="300" height="56" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  </g>
  <text x="450" y="515" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">server-runtime</text>
  <text x="450" y="533" text-anchor="middle" font-size="11" fill="#c62828">Domain model · runtime base</text>

  <!-- ════ EDGES ════ -->

  <!-- parent membership (dashed gray): root → start -->
  <line x1="360" y1="146" x2="200" y2="230" stroke="#aaa" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <!-- root → openapi -->
  <line x1="540" y1="146" x2="700" y2="230" stroke="#aaa" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <!-- root → core -->
  <line x1="430" y1="146" x2="415" y2="380" stroke="#aaa" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <!-- root → runtime -->
  <line x1="470" y1="146" x2="480" y2="490" stroke="#aaa" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- start → openapi (compile dep) -->
  <line x1="260" y1="252" x2="635" y2="252" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- start → core -->
  <line x1="220" y1="278" x2="345" y2="380" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- start → runtime (direct dep) -->
  <line x1="145" y1="286" x2="330" y2="490" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- openapi → core -->
  <line x1="695" y1="278" x2="560" y2="380" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- core → runtime -->
  <line x1="450" y1="436" x2="450" y2="490" stroke="#4a4a4a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ════ LEGEND ════ -->
  <rect x="30" y="400" width="220" height="118" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="140" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Legend</text>

  <line x1="50" y1="438" x2="110" y2="438" stroke="#aaa" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>
  <text x="120" y="442" font-size="11" fill="#555">parent / module</text>

  <line x1="50" y1="462" x2="110" y2="462" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="120" y="466" font-size="11" fill="#333">compile dependency</text>

  <line x1="50" y1="486" x2="110" y2="486" stroke="#d32f2f" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="120" y="490" font-size="11" fill="#d32f2f">circular dependency</text>

  <text x="140" y="508" text-anchor="middle" font-size="10" fill="#999">(none detected)</text>

  <!-- no-cycle badge -->
  <rect x="635" y="400" width="230" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="750" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">✓ No circular dependencies</text>
  <text x="750" y="440" text-anchor="middle" font-size="11" fill="#388e3c">clean DAG: runtime ← core ← openapi/start</text>
</svg>
