  <text x="110" y="259" text-anchor="middle" font-size="9.5" fill="#888">Channel Adapter 启动</text>
  <rect x="372" y="122" width="120" height="50" rx="6" fill="#00000012"/>
  <rect x="370" y="120" width="120" height="50" rx="6" fill="white" stroke="#E09A52" stroke-width="2"/>
