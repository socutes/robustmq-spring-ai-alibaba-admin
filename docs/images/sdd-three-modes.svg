  <text x="480" y="538" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="middle">delta spec（OpenSpec 独有）：写"这次要改什么"，不写完整 spec，专为改造/开源贡献/增量 feature 设计</text>
  <text x="480" y="554" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#1A3A6B" text-anchor="middle">三种模式不是替代关系，成熟工程师三种都会，按场景切换</text>
