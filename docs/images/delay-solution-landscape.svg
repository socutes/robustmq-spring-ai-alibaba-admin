  <text x="490" y="516" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#555" text-anchor="middle">通用 · 独立 · 专注延时投递 · 社区活跃的开源项目——当下没有事实标准</text>
