  <text x="382" y="610" text-anchor="middle" font-size="10" fill="#546e7a">RAG pipeline</text>
  <text x="382" y="625" text-anchor="middle" font-size="10" fill="#546e7a">event bus</text>
  <text x="382" y="641" text-anchor="middle" font-size="10" fill="#78909c">:18080</text>

