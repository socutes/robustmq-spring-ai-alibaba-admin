  <text x="18" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32" transform="rotate(-90,18,370)">BACKEND</text>
  <text x="18" y="610" text-anchor="middle" font-size="10" font-weight="700" fill="#ef6c00" transform="rotate(-90,18,610)">MIDDLEWARE</text>
  <text x="18" y="754" text-anchor="middle" font-size="10" font-weight="700" fill="#c62828" transform="rotate(-90,18,754)">DATABASE</text>
