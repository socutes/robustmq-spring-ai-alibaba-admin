  <text x="866" y="162" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">200+ AWS 服务 ta</text>
  <text x="866" y="174" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">rget，2022 年推出</text>
  <rect x="784" y="188" width="165" height="48" fill="#fff" stroke="#52B366" rx="4" stroke-width="1" />
  <text x="866" y="204" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#52B366" text-anchor="middle">GCP Cloud Tasks</text>
  <text x="866" y="222" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">2018 年起，设计类似</text>
