name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# 同一分支/PR 有新 push 时取消正在运行的旧 job，节省 runner 时间
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mvn test (Java 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ── 中间件服务 ───────────────────────────────────────────────────────────────
    # 与 docker-compose.dev.yml 保持版本一致；
    # 当前 7 个测试均为纯单元测试，无需真实中间件，services 区先声明但不启动，
    # 等 Batch 4+ 集成测试落地后取消注释对应服务即可。
    #
    # services:
    #   mysql:
    #     image: mysql:8.0.35
    #     env:
    #       MYSQL_ROOT_PASSWORD: root
    #       MYSQL_DATABASE: admin
    #       MYSQL_USER: admin
    #       MYSQL_PASSWORD: admin
    #     ports:
    #       - 3306:3306
    #     options: >-
    #       --health-cmd "mysqladmin ping -h localhost -u admin -padmin"
    #       --health-interval 5s
    #       --health-timeout 10s
    #       --health-retries 12
    #
    #   redis:
    #     image: redis:7.2.5
    #     ports:
    #       - 6379:6379
    #     options: >-
    #       --health-cmd "redis-cli ping"
    #       --health-interval 5s
    #       --health-timeout 5s
    #       --health-retries 10
    #
    #   elasticsearch:
    #     image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
    #     env:
    #       discovery.type: single-node
    #       xpack.security.enabled: "false"
    #       xpack.ml.enabled: "false"
    #       ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    #     ports:
    #       - 9200:9200
    #     options: >-
    #       --health-cmd "curl -sf http://localhost:9200/_cluster/health"
    #       --health-interval 15s
    #       --health-timeout 10s
    #       --health-retries 10
    #       --health-start-period 60s

    steps:
      # ── 检出代码 ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── JDK 17（与 pom.xml java.version 一致）────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          # setup-java 内置 Maven 依赖缓存，key 基于 **/pom.xml hash
          cache: maven

      # ── 构建（跳过测试，仅编译，确保 SNAPSHOT jar 进本地仓库）────────────────
      # server-core 依赖 server-runtime 的 SNAPSHOT jar，
      # 需要先 install runtime 才能独立跑 core 的测试。
      - name: Build (install, skip tests)
        run: mvn install -DskipTests -q

      # ── 跑测试 ────────────────────────────────────────────────────────────────
      # 只对有测试的模块执行，避免其余模块产生 "No tests to run" 噪音。
      # -fae: fail at end，所有模块跑完再汇总失败，而不是第一个失败就停。
      - name: Run tests
        run: |
          mvn test \
            -pl spring-ai-alibaba-admin-server-runtime,spring-ai-alibaba-admin-server-core \
            --offline \
            -fae \
            -Dsurefire.failIfNoSpecifiedTests=false

      # ── 上传测试报告（无论成功/失败都执行）────────────────────────────────────
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          # Surefire 默认输出目录；多模块路径用 glob
          path: "**/target/surefire-reports/"
          retention-days: 14
          # 没有报告时不报错（模块无测试时目录不存在）
          if-no-files-found: ignore

      # ── 发布测试摘要（PR / commit 页面直接显示）─────────────────────────────
      - name: Publish test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Test Results"
          # 失败时标记 check 为 failure，block merge
          fail_on_failure: true
          # 没有报告文件时不报错
          require_tests: false
