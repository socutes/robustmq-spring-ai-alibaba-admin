  <text x="299" y="110" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6" text-anchor="middle">延时队列</text>
  <rect x="217" y="132" width="165" height="48" fill="#fff" stroke="#8B5CF6" rx="4" stroke-width="1" />
  <text x="299" y="148" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Redisson DelayedQueue</text>
  <text x="299" y="162" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">Java 生态主流，</text>
  <text x="299" y="174" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">基于 Redis ZSet</text>
  <rect x="217" y="188" width="165" height="48" fill="#fff" stroke="#8B5CF6" rx="4" stroke-width="1" />
  <text x="299" y="204" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#8B5CF6" text-anchor="middle">HDT3213/delayqueue</text>
  <text x="299" y="222" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">Go 生态，支持横向扩展</text>
  <rect x="217" y="244" width="165" height="48" fill="#fff" stroke="#8B5CF6" rx="4" stroke-width="1" />
  <text x="299" y="260" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Apache Curator</text>
  <text x="299" y="278" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">ZK 实现，性能瓶颈明显</text>
  <rect x="217" y="414" width="165" height="44" fill="#F8F8F8" stroke="#8B5CF6" rx="4" stroke-width="1" />
  <text x="299" y="430" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">核心边界：大 Key 问题 / 客户端维护成本</text>
  <text x="299" y="445" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">无法做成通用基础设施</text>
