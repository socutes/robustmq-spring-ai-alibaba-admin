  <ns0:text x="150" y="188" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="start">一句话说清楚做什么</ns0:text>
