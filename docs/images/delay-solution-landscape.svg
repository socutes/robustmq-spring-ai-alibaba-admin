  <text x="110" y="110" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#4A90D9" text-anchor="middle">内置延时</text>
  <rect x="28" y="132" width="165" height="48" fill="#fff" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="148" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">Kafka</text>
  <text x="110" y="166" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">无原生延时能力</text>
  <rect x="28" y="188" width="165" height="48" fill="#fff" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="204" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">RocketMQ 4.x</text>
  <text x="110" y="222" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">18 档固定，最长 2h</text>
  <rect x="28" y="244" width="165" height="48" fill="#fff" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="260" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">RocketMQ 5.0</text>
  <text x="110" y="278" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">任意延时，成熟度待验证</text>
  <rect x="28" y="300" width="165" height="48" fill="#fff" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="316" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">Pulsar</text>
  <text x="110" y="334" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">原生支持，但体系重</text>
  <rect x="28" y="356" width="165" height="48" fill="#fff" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="372" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#4A90D9" text-anchor="middle">RabbitMQ</text>
  <text x="110" y="386" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">TTL+死信/插件，</text>
  <text x="110" y="398" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">不适合大规模</text>
  <rect x="28" y="414" width="165" height="44" fill="#F8F8F8" stroke="#4A90D9" rx="4" stroke-width="1" />
  <text x="110" y="430" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">核心边界：绑定特定中间件体系</text>
  <text x="110" y="445" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">业务下游不止消息中间件</text>
