  <text x="866" y="445" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">私有化/跨云/国内业务不适用</text>
  <rect x="20" y="476" width="940" height="86" fill="#F0F4FF" stroke="#B0C0E0" rx="8" stroke-width="1" />
