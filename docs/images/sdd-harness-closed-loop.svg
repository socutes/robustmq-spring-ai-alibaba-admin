  <text x="78" y="182" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">结构化需求，有验收标准</text>
  <rect x="56" y="204" width="348" height="44" fill="#fff" stroke="#B0CCE8" rx="6" stroke-width="1" />
