<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="860" viewBox="0 0 1100 860">
  <defs>
    <style>
      text { font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; }
      .title  { font-size: 16px; font-weight: 700; fill: #e6edf3; }
      .sub    { font-size: 11px; fill: #8b949e; }
      .actor  { font-size: 12px; font-weight: 600; }
      .msg    { font-size: 11px; fill: #c9d1d9; }
      .method { font-size: 10px; fill: #58a6ff; font-style: italic; }
      .ret    { font-size: 10px; fill: #3fb950; font-style: italic; }
      .note   { font-size: 10px; fill: #f0883e; }
      .err    { font-size: 10px; fill: #ff7b72; }
      .label  { font-size: 10px; fill: #8b949e; }
    </style>
    <!-- solid arrow -->
    <marker id="solid" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <!-- return arrow -->
    <marker id="ret-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <!-- error arrow -->
    <marker id="err-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff7b72"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="#0d1117"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" class="title">POST /api/prompt — 创建 Prompt 调用链时序图</text>
  <text x="550" y="54" text-anchor="middle" class="sub">真实代码路径 · Controller → Service → Mapper → MySQL</text>

  <!-- ═══════════ ACTOR BOXES (top) ═══════════ -->
  <!-- x positions: Client=80, Controller=260, Service=460, Mapper=660, MySQL=880 -->

  <!-- Client -->
  <rect x="30"  y="70" width="100" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="80"  y="88"  text-anchor="middle" class="actor" fill="#e6edf3">Client</text>
  <text x="80"  y="103" text-anchor="middle" class="label">Browser / API</text>

  <!-- PromptController -->
  <rect x="200" y="70" width="120" height="44" rx="6" fill="#0f1e35" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="260" y="88"  text-anchor="middle" class="actor" fill="#82b4f7">PromptController</text>
  <text x="260" y="103" text-anchor="middle" class="label">controller 层</text>

  <!-- PromptServiceImpl -->
  <rect x="395" y="70" width="130" height="44" rx="6" fill="#0d1f12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="460" y="88"  text-anchor="middle" class="actor" fill="#86efac">PromptServiceImpl</text>
  <text x="460" y="103" text-anchor="middle" class="label">service 层</text>

  <!-- PromptMapper -->
  <rect x="595" y="70" width="120" height="44" rx="6" fill="#1a0d2e" stroke="#c084fc" stroke-width="1.5"/>
  <text x="655" y="88"  text-anchor="middle" class="actor" fill="#d8b4fe">PromptMapper</text>
  <text x="655" y="103" text-anchor="middle" class="label">MyBatis mapper</text>

  <!-- MySQL -->
  <rect x="820" y="70" width="120" height="44" rx="6" fill="#1f1a08" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="880" y="88"  text-anchor="middle" class="actor" fill="#fde68a">MySQL</text>
  <text x="880" y="103" text-anchor="middle" class="label">admin DB · prompt</text>

  <!-- ═══════════ LIFELINES ═══════════ -->
  <line x1="80"  y1="114" x2="80"  y2="830" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="114" x2="260" y2="830" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="114" x2="460" y2="830" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="655" y1="114" x2="655" y2="830" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="880" y1="114" x2="880" y2="830" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══════════ ACTIVATION BOXES ═══════════ -->
  <rect x="255" y="145" width="10" height="530" rx="2" fill="#1e3a5f" opacity="0.8"/>
  <rect x="455" y="190" width="10" height="430" rx="2" fill="#1a3a1a" opacity="0.8"/>
  <rect x="650" y="255" width="10" height="120" rx="2" fill="#2a1a4a" opacity="0.8"/>
  <rect x="650" y="415" width="10" height="80"  rx="2" fill="#2a1a4a" opacity="0.8"/>
  <rect x="875" y="270" width="10" height="75"  rx="2" fill="#2a200a" opacity="0.8"/>
  <rect x="875" y="430" width="10" height="50"  rx="2" fill="#2a200a" opacity="0.8"/>

  <!-- ═══════════ SEQUENCE STEPS ═══════════ -->

  <!-- 1. Client → Controller: HTTP POST -->
  <line x1="80" y1="150" x2="250" y2="150" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="162" y="144" text-anchor="middle" class="msg">POST /api/prompt</text>
  <text x="162" y="157" text-anchor="middle" class="method">{ promptKey, promptDescription, tags }</text>

  <!-- 2. Controller: @Validated -->
  <rect x="215" y="165" width="175" height="22" rx="3" fill="#1a2a1a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="302" y="180" text-anchor="middle" class="note">@Validated — Bean Validation</text>
  <text x="302" y="191" text-anchor="middle" class="label">@NotBlank promptKey · @Size · @Pattern ^[a-zA-Z0-9_-]+$</text>

  <!-- Validation error path -->
  <line x1="260" y1="197" x2="90" y2="197" stroke="#ff7b72" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#err-arr)"/>
  <text x="175" y="192" text-anchor="middle" class="err">400 MethodArgumentNotValidException</text>
  <text x="175" y="203" text-anchor="middle" class="err">[校验失败时直接返回]</text>

  <!-- 3. Controller → Service -->
  <line x1="260" y1="215" x2="450" y2="215" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="355" y="209" text-anchor="middle" class="msg">promptService.create(request)</text>
  <text x="355" y="220" text-anchor="middle" class="method">PromptServiceImpl.create()</text>

  <!-- 4. @Transactional begin -->
  <rect x="415" y="226" width="175" height="16" rx="3" fill="#0d1a30" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="502" y="238" text-anchor="middle" class="note">@Transactional begin</text>

  <!-- 5. Service → Mapper: selectByPromptKey (duplicate check) -->
  <line x1="460" y1="255" x2="645" y2="255" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="550" y="249" text-anchor="middle" class="msg">selectByPromptKey(promptKey)</text>
  <text x="550" y="260" text-anchor="middle" class="method">PromptMapper.selectByPromptKey()</text>

  <!-- 6. Mapper → MySQL: SELECT -->
  <line x1="655" y1="275" x2="870" y2="275" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="760" y="268" text-anchor="middle" class="msg">SELECT * FROM prompt</text>
  <text x="760" y="279" text-anchor="middle" class="method">WHERE prompt_key = #{promptKey}</text>

  <!-- 7. MySQL → Mapper: result -->
  <line x1="875" y1="310" x2="665" y2="310" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="770" y="305" text-anchor="middle" class="ret">PromptDO or null</text>

  <!-- 8. Mapper → Service: result -->
  <line x1="650" y1="330" x2="470" y2="330" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="558" y="325" text-anchor="middle" class="ret">PromptDO or null</text>

  <!-- 9. Duplicate check branch -->
  <rect x="415" y="340" width="175" height="28" rx="3" fill="#2a0d0d" stroke="#ff7b72" stroke-width="0.8"/>
  <text x="502" y="354" text-anchor="middle" class="err">if existingPrompt != null</text>
  <text x="502" y="365" text-anchor="middle" class="err">→ throw StudioException(409)</text>

  <!-- Error return -->
  <line x1="460" y1="374" x2="270" y2="374" stroke="#ff7b72" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#err-arr)"/>
  <line x1="270" y1="374" x2="90"  y2="374" stroke="#ff7b72" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#err-arr)"/>
  <text x="360" y="369" text-anchor="middle" class="err">409 Prompt Key 已存在</text>

  <!-- Separator -->
  <line x1="60" y1="390" x2="1040" y2="390" stroke="#21262d" stroke-width="0.8" stroke-dasharray="2,4"/>
  <text x="550" y="401" text-anchor="middle" class="label">─── promptKey 不存在，继续创建 ───</text>

  <!-- 10. Service: build PromptDO -->
  <rect x="415" y="408" width="175" height="22" rx="3" fill="#122018" stroke="#4ade80" stroke-width="0.8"/>
  <text x="502" y="420" text-anchor="middle" class="note">PromptDO.builder()</text>
  <text x="502" y="430" text-anchor="middle" class="label">.promptKey .promptDesc .tags .build()</text>

  <!-- 11. Service → Mapper: insert -->
  <line x1="460" y1="440" x2="645" y2="440" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="550" y="434" text-anchor="middle" class="msg">promptMapper.insert(promptDO)</text>
  <text x="550" y="445" text-anchor="middle" class="method">PromptMapper.insert()</text>

  <!-- 12. Mapper → MySQL: INSERT -->
  <line x1="655" y1="462" x2="870" y2="462" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="760" y="455" text-anchor="middle" class="msg">INSERT INTO prompt</text>
  <text x="760" y="466" text-anchor="middle" class="method">(prompt_key, prompt_desc, tags, create_time, update_time)</text>
  <text x="760" y="477" text-anchor="middle" class="method">VALUES (..., NOW(), NOW())</text>

  <!-- 13. MySQL → Mapper: auto-generated id -->
  <line x1="875" y1="493" x2="665" y2="493" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="770" y="488" text-anchor="middle" class="ret">useGeneratedKeys=true → promptDO.id 回填</text>

  <!-- 14. Mapper → Service -->
  <line x1="650" y1="510" x2="470" y2="510" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="558" y="505" text-anchor="middle" class="ret">受影响行数 (int 1)</text>

  <!-- 15. @Transactional commit -->
  <rect x="415" y="520" width="175" height="16" rx="3" fill="#0d1a30" stroke="#4a9eff" stroke-width="0.8"/>
  <text x="502" y="532" text-anchor="middle" class="note">@Transactional commit</text>

  <!-- 16. Service: Prompt.fromDO -->
  <rect x="415" y="542" width="175" height="22" rx="3" fill="#122018" stroke="#4ade80" stroke-width="0.8"/>
  <text x="502" y="554" text-anchor="middle" class="note">Prompt.fromDO(promptDO)</text>
  <text x="502" y="565" text-anchor="middle" class="label">PromptDO → Prompt DTO 转换</text>

  <!-- 17. Service → Controller: Prompt -->
  <line x1="455" y1="575" x2="270" y2="575" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="360" y="569" text-anchor="middle" class="ret">Prompt { promptKey, promptDescription, ... }</text>

  <!-- 18. Controller: wrap Result -->
  <rect x="215" y="585" width="175" height="16" rx="3" fill="#1a2a1a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="302" y="597" text-anchor="middle" class="note">Result.success(prompt)</text>

  <!-- 19. Controller → Client: 200 OK -->
  <line x1="255" y1="615" x2="90" y2="615" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="170" y="609" text-anchor="middle" class="ret">HTTP 200</text>
  <text x="170" y="620" text-anchor="middle" class="ret">{ code: 200, data: { promptKey, ... } }</text>

  <!-- ═══════════ ACTOR BOXES (bottom mirrors) ═══════════ -->
  <rect x="30"  y="636" width="100" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="80"  y="654" text-anchor="middle" class="actor" fill="#e6edf3">Client</text>
  <text x="80"  y="669" text-anchor="middle" class="label">Browser / API</text>

  <rect x="200" y="636" width="120" height="44" rx="6" fill="#0f1e35" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="260" y="654" text-anchor="middle" class="actor" fill="#82b4f7">PromptController</text>
  <text x="260" y="669" text-anchor="middle" class="label">controller 层</text>

  <rect x="395" y="636" width="130" height="44" rx="6" fill="#0d1f12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="460" y="654" text-anchor="middle" class="actor" fill="#86efac">PromptServiceImpl</text>
  <text x="460" y="669" text-anchor="middle" class="label">service 层</text>

  <rect x="595" y="636" width="120" height="44" rx="6" fill="#1a0d2e" stroke="#c084fc" stroke-width="1.5"/>
  <text x="655" y="654" text-anchor="middle" class="actor" fill="#d8b4fe">PromptMapper</text>
  <text x="655" y="669" text-anchor="middle" class="label">MyBatis mapper</text>

  <rect x="820" y="636" width="120" height="44" rx="6" fill="#1f1a08" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="880" y="654" text-anchor="middle" class="actor" fill="#fde68a">MySQL</text>
  <text x="880" y="669" text-anchor="middle" class="label">admin DB · prompt</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="30" y="700" width="1040" height="145" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="720" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">图例 · Legend</text>

  <!-- Call arrow -->
  <line x1="60"  y1="740" x2="130" y2="740" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="140" y="745" font-size="10" fill="#c9d1d9">方法调用 / HTTP 请求</text>

  <!-- Return arrow -->
  <line x1="60"  y1="762" x2="130" y2="762" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,2" marker-end="url(#ret-arr)"/>
  <text x="140" y="767" font-size="10" fill="#c9d1d9">返回值 / HTTP 响应</text>

  <!-- Error arrow -->
  <line x1="60"  y1="784" x2="130" y2="784" stroke="#ff7b72" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#err-arr)"/>
  <text x="140" y="789" font-size="10" fill="#c9d1d9">异常 / 错误响应</text>

  <!-- Activation box -->
  <rect x="62" y="798" width="10" height="16" rx="2" fill="#1e3a5f"/>
  <text x="140" y="811" font-size="10" fill="#c9d1d9">执行激活区（方法栈帧）</text>

  <!-- Note box -->
  <rect x="400" y="730" width="640" height="100" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="720" y="748" text-anchor="middle" font-size="11" font-weight="600" fill="#f0883e">关键路径说明</text>
  <text x="420" y="766" font-size="10" fill="#c9d1d9">① @Validated 在 Controller 层拦截，格式错误直接 400，不进 Service</text>
  <text x="420" y="782" font-size="10" fill="#c9d1d9">② Service.create() 加 @Transactional，先 SELECT 去重再 INSERT，原子保证</text>
  <text x="420" y="798" font-size="10" fill="#c9d1d9">③ Mapper INSERT 使用 useGeneratedKeys=true，自增 id 回填到 PromptDO</text>
  <text x="420" y="814" font-size="10" fill="#c9d1d9">④ Prompt.fromDO() 做 DO→DTO 转换，controller 层用 Result.success() 包装返回</text>
  <text x="420" y="830" font-size="10" fill="#c9d1d9">⑤ promptKey 重复时 Service 抛 StudioException(409)，全局异常处理器统一序列化</text>
</svg>
