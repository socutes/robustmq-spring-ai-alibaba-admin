<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720">
  <rect width="1060" height="720" fill="#FAFBFF" />
  <text x="530" y="30" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1A3A6B" text-anchor="middle">多层时间轮设计</text>
  <text x="530" y="50" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">4层嵌套覆盖1秒~30天 · O(1)插入触发 · 到期降级 · 调度循环不做重IO</text>
  <rect x="20" y="65" width="430" height="430" fill="#fff" rx="6" stroke="#B07219" stroke-width="2" />
  <rect x="20" y="65" width="430" height="7" fill="#B07219" rx="4" />
  <rect x="20" y="69" width="430" height="4" fill="#B07219" rx="0" />
  <text x="235" y="89" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#B07219" text-anchor="middle">第四层 · 30天</text>
  <text x="235" y="105" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">30 槽，步长=1天</text>
  <text x="235" y="119" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">覆盖范围：1天~30天</text>
  <rect x="50" y="95" width="370" height="370" fill="#fff" rx="6" stroke="#E05252" stroke-width="2" />
  <rect x="50" y="95" width="370" height="7" fill="#E05252" rx="4" />
  <rect x="50" y="99" width="370" height="4" fill="#E05252" rx="0" />
  <text x="235" y="119" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#E05252" text-anchor="middle">第三层 · 24小时</text>
  <text x="235" y="135" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">24 槽，步长=1小时</text>
  <text x="235" y="149" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">覆盖范围：1小时~24小时</text>
  <rect x="80" y="125" width="310" height="310" fill="#fff" rx="6" stroke="#52B366" stroke-width="2" />
  <rect x="80" y="125" width="310" height="7" fill="#52B366" rx="4" />
  <rect x="80" y="129" width="310" height="4" fill="#52B366" rx="0" />
  <text x="235" y="149" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#52B366" text-anchor="middle">第二层 · 60分钟</text>
  <text x="235" y="165" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">60 槽，步长=1分钟</text>
  <text x="235" y="179" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">覆盖范围：1分钟~60分钟</text>
  <rect x="110" y="155" width="250" height="250" fill="#fff" rx="6" stroke="#4A90D9" stroke-width="2" />
  <rect x="110" y="155" width="250" height="7" fill="#4A90D9" rx="4" />
  <rect x="110" y="159" width="250" height="4" fill="#4A90D9" rx="0" />
  <text x="235" y="179" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#4A90D9" text-anchor="middle">第一层 · 60秒</text>
  <text x="235" y="195" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">60 槽，步长=1秒</text>
  <text x="235" y="209" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">覆盖范围：1秒~60秒</text>
  <line x1="245" y1="300" x2="245" y2="330" stroke="#B07219" stroke-width="1.5" />
  <polygon points="245,330 242.0,323.0 248.0,323.0" fill="#B07219" />
  <text x="275" y="318" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#B07219" text-anchor="start">到期降级</text>
  <line x1="275" y1="300" x2="275" y2="330" stroke="#E05252" stroke-width="1.5" />
  <polygon points="275,330 272.0,323.0 278.0,323.0" fill="#E05252" />
  <text x="305" y="318" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#E05252" text-anchor="start">到期降级</text>
  <line x1="305" y1="300" x2="305" y2="330" stroke="#52B366" stroke-width="1.5" />
  <polygon points="305,330 302.0,323.0 308.0,323.0" fill="#52B366" />
  <text x="335" y="318" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#52B366" text-anchor="start">到期降级</text>
  <rect x="120" y="230" width="230" height="80" fill="#FFFBF0" rx="4" stroke="#B07219" stroke-width="1" />
  <text x="235" y="248" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#B07219" text-anchor="middle">插入示例：delay=90分钟</text>
  <text x="235" y="264" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="middle">→ 第三层 slot=1（1小时后降级）</text>
  <text x="235" y="278" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="middle">→ 降到第二层 slot=30（30分钟）</text>
  <text x="235" y="292" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="middle">→ 降到第一层 tick=0 触发投递</text>
  <rect x="470" y="65" width="280" height="250" fill="#F8F8FF" rx="8" stroke="#4A90D9" stroke-width="2" />
  <rect x="470" y="65" width="280" height="8" fill="#4A90D9" rx="4" />
  <rect x="470" y="69" width="280" height="4" fill="#4A90D9" rx="0" />
  <text x="610" y="89" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#4A90D9" text-anchor="middle">调度循环（关键路径设计）</text>
  <text x="482" y="105" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">while running:</text>
  <text x="482" y="117" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  msgs = wheel[pointer]</text>
  <text x="482" y="129" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  // O(1) 取槽</text>
  <text x="482" y="141" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  for msg in msgs:</text>
  <text x="482" y="153" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">    if layer==0:</text>
  <text x="482" y="165" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">      sink_pool.submit(</text>
  <text x="482" y="177" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">        deliver, msg)  // 异步</text>
  <text x="482" y="189" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">    else:</text>
  <text x="482" y="201" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">      lower_wheel.add(msg)</text>
  <text x="482" y="213" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">      // 降级</text>
  <text x="482" y="225" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  pointer = (pointer+1) % size</text>
  <text x="482" y="237" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  sleep_until_next_slot()</text>
  <text x="482" y="249" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">  // 补偿耗时，防漂移</text>
  <rect x="470" y="325" width="280" height="90" fill="#EDF9EE" rx="6" stroke="#52B366" stroke-width="1.5" />
  <text x="610" y="343" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#2D7D2D" text-anchor="middle">性能指标</text>
  <text x="482" y="358" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="#444" text-anchor="start">插入复杂度:</text>
  <text x="742" y="358" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#2D7D2D" text-anchor="end">O(1)</text>
  <text x="482" y="374" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="#444" text-anchor="start">触发复杂度:</text>
  <text x="742" y="374" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#2D7D2D" text-anchor="end">O(1)</text>
  <text x="482" y="390" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="#444" text-anchor="start">内存占用:</text>
  <text x="742" y="390" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#2D7D2D" text-anchor="end">O(slots × layers)</text>
  <text x="482" y="406" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="#444" text-anchor="start">精度误差:</text>
  <text x="742" y="406" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#2D7D2D" text-anchor="end">&lt; 1秒（slot步长）</text>
  <rect x="770" y="65" width="270" height="350" fill="#F3EEFF" rx="8" stroke="#8B5CF6" stroke-width="2" />
  <rect x="770" y="65" width="270" height="8" fill="#8B5CF6" rx="4" />
  <rect x="770" y="69" width="270" height="4" fill="#8B5CF6" rx="0" />
  <text x="905" y="89" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#8B5CF6" text-anchor="middle">集群分布策略</text>
  <rect x="780" y="100" width="250" height="100" fill="#fff" rx="5" stroke="#C0A0E8" stroke-width="1" />
  <text x="905" y="118" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#5B2DC0" text-anchor="middle">消息分片规则</text>
  <text x="784" y="134" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="start">shard = msgId % nodeCount</text>
  <text x="784" y="149" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">• 同一消息始终在同一节点</text>
  <text x="784" y="164" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">• Master 节点负责本 shard 调度</text>
  <text x="784" y="179" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">• Slave 跟随复制，不独立触发</text>
  <text x="784" y="194" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">• rebalance 时重新分配 shard</text>
  <rect x="780" y="212" width="250" height="52" fill="#fff" rx="5" stroke="#4A90D9" stroke-width="1.5" />
  <rect x="780" y="212" width="250" height="5" fill="#4A90D9" rx="4" />
  <rect x="780" y="216" width="250" height="4" fill="#4A90D9" rx="0" />
  <text x="905" y="234" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#4A90D9" text-anchor="middle">节点0</text>
  <text x="905" y="248" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">(Master)</text>
  <text x="1026" y="248" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#888" text-anchor="end">shard 0,3,6…</text>
  <rect x="780" y="274" width="250" height="52" fill="#fff" rx="5" stroke="#52B366" stroke-width="1.5" />
  <rect x="780" y="274" width="250" height="5" fill="#52B366" rx="4" />
  <rect x="780" y="278" width="250" height="4" fill="#52B366" rx="0" />
  <text x="905" y="296" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#52B366" text-anchor="middle">节点1</text>
  <text x="905" y="310" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">(Slave)</text>
  <text x="1026" y="310" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#888" text-anchor="end">shard 1,4,7…</text>
  <rect x="780" y="336" width="250" height="52" fill="#fff" rx="5" stroke="#E09A52" stroke-width="1.5" />
  <rect x="780" y="336" width="250" height="5" fill="#E09A52" rx="4" />
  <rect x="780" y="340" width="250" height="4" fill="#E09A52" rx="0" />
  <text x="905" y="358" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#E09A52" text-anchor="middle">节点2</text>
  <text x="905" y="372" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">(Slave)</text>
  <text x="1026" y="372" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#888" text-anchor="end">shard 2,5,8…</text>
  <rect x="780" y="422" width="250" height="50" fill="#FFF8E8" rx="5" stroke="#E09A52" stroke-width="1" />
  <text x="905" y="438" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#B07219" text-anchor="middle">Rebalance 触发条件</text>
  <text x="905" y="452" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="middle">节点加入 / 离开 / 故障转移</text>
  <text x="905" y="466" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">→ ETCD Watch 事件驱动重分片</text>
  <rect x="20" y="500" width="1020" height="70" fill="#FAFAFA" rx="8" stroke="#CCC" stroke-width="1" />
  <text x="530" y="518" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">4层时间轮参数汇总</text>
  <text x="65" y="534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#555" text-anchor="middle">层</text>
  <text x="160" y="534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#555" text-anchor="middle">槽数</text>
  <text x="270" y="534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#555" text-anchor="middle">步长</text>
  <text x="415" y="534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#555" text-anchor="middle">覆盖范围</text>
  <text x="610" y="534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#555" text-anchor="middle">溢出处理</text>
  <line x1="25" y1="538" x2="1035" y2="538" stroke="#DDD" stroke-width="1" />
  <text x="65" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">L1</text>
  <text x="160" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">60</text>
  <text x="270" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1秒</text>
  <text x="415" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1s ~ 60s</text>
  <text x="610" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">无（最小粒度）</text>
  <text x="65" y="566" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">L2</text>
  <text x="160" y="566" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">60</text>
  <text x="270" y="566" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1分钟</text>
  <text x="415" y="566" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1m ~ 60m</text>
  <text x="610" y="566" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">降级到 L1</text>
  <text x="65" y="580" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">L3</text>
  <text x="160" y="580" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">24</text>
  <text x="270" y="580" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1小时</text>
  <text x="415" y="580" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1h ~ 24h</text>
  <text x="610" y="580" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">降级到 L2</text>
  <text x="65" y="594" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">L4</text>
  <text x="160" y="594" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">30</text>
  <text x="270" y="594" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1天</text>
  <text x="415" y="594" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">1d ~ 30d</text>
  <text x="610" y="594" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#333" text-anchor="middle">降级到 L3</text>
</svg>