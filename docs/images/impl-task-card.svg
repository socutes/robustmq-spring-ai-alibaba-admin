  <ns0:text x="150" y="364" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="start">功能 · 质量(80%覆盖率) · 性能</ns0:text>
  <ns0:text x="150" y="380" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="start">能被测试或运行验证</ns0:text>
