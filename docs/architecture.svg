  <text x="518" y="610" text-anchor="middle" font-size="10" fill="#546e7a">Full-text search</text>
  <text x="518" y="625" text-anchor="middle" font-size="10" fill="#546e7a">Trace index</text>
  <text x="518" y="641" text-anchor="middle" font-size="10" fill="#78909c">:9200</text>

  <!-- Loong Collector -->
  <rect x="594" y="558" width="120" height="108" rx="8" fill="white" stroke="#ffcc80" stroke-width="1.2" filter="url(#sh)"/>
  <text x="654" y="578" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">LoongCollector</text>
