<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="860" viewBox="0 0 1060 860"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#607d8b"/>
    </marker>
    <marker id="arr-ext" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#9e9e9e"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="122%" height="122%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <!-- stripe pattern for external AI band -->
    <pattern id="stripe" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#e0e0e0" stroke-width="4"/>
    </pattern>
  </defs>

  <!-- ═══════════ PAGE BACKGROUND ═══════════ -->
  <rect width="1060" height="860" rx="14" fill="#f0f2f5"/>

  <!-- ═══════════ TITLE ═══════════ -->
  <text x="530" y="44" text-anchor="middle" font-size="21" font-weight="700" fill="#1a237e">Spring AI Alibaba Admin — System Architecture</text>
  <text x="530" y="64" text-anchor="middle" font-size="12" fill="#78909c">Agent Studio · AI Agent lifecycle management platform</text>

  <!-- ════════════════════════════════════════════════════
       LAYER 1 — FRONTEND  (y 84 – 190)
  ════════════════════════════════════════════════════ -->
  <rect x="30" y="80" width="700" height="118" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="100" font-size="11" font-weight="700" fill="#1565c0" letter-spacing="1">FRONTEND  (React 18 + Ant Design 5 · agentscope-frontend)</text>

  <!-- front boxes -->
  <rect x="50" y="108" width="148" height="74" rx="8" fill="white" stroke="#90caf9" stroke-width="1.2" filter="url(#sh)"/>
  <text x="124" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">Prompt Studio</text>
  <text x="124" y="145" text-anchor="middle" font-size="10" fill="#546e7a">Template · version ·</text>
  <text x="124" y="158" text-anchor="middle" font-size="10" fill="#546e7a">debug · session chat</text>
  <text x="124" y="173" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">@spark-ai/chat</text>

  <rect x="214" y="108" width="148" height="74" rx="8" fill="white" stroke="#90caf9" stroke-width="1.2" filter="url(#sh)"/>
  <text x="288" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">Dataset &amp; Evaluator</text>
  <text x="288" y="145" text-anchor="middle" font-size="10" fill="#546e7a">Import / version /</text>
  <text x="288" y="158" text-anchor="middle" font-size="10" fill="#546e7a">evaluator templates</text>
  <text x="288" y="173" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">@spark-ai/design</text>

  <rect x="378" y="108" width="148" height="74" rx="8" fill="white" stroke="#90caf9" stroke-width="1.2" filter="url(#sh)"/>
  <text x="452" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">Experiment</text>
  <text x="452" y="145" text-anchor="middle" font-size="10" fill="#546e7a">Run · compare ·</text>
  <text x="452" y="158" text-anchor="middle" font-size="10" fill="#546e7a">result analysis</text>
  <text x="452" y="173" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">axios / dnd-kit</text>

  <rect x="542" y="108" width="148" height="74" rx="8" fill="white" stroke="#90caf9" stroke-width="1.2" filter="url(#sh)"/>
