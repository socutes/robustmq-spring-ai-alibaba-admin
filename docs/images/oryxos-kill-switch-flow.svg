<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4A90D9"/></marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#E09A52"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#52B366"/></marker>
  <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#E05252"/></marker>
  <marker id="arr-red-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#E05252"/></marker>
</defs>
<rect width="720" height="460" fill="#FAFBFF"/>
<text x="360" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2B5E" text-anchor="middle">Kill Switch 生效链路</text>
<rect x="28" y="42" width="88" height="36" rx="5" ry="5" fill="#444444" opacity="0.18" stroke="#444444" stroke-width="1.5"/>
<text x="72" y="65" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#444444" text-anchor="middle">管理员</text>
<line x1="72" y1="78" x2="72" y2="430" stroke="#444444" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
<rect x="156" y="42" width="88" height="36" rx="5" ry="5" fill="#4A90D9" opacity="0.18" stroke="#4A90D9" stroke-width="1.5"/>
<text x="200" y="57" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#4A90D9" text-anchor="middle">管控平面</text>
<text x="200" y="71" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#4A90D9" text-anchor="middle">前端 React</text>
<line x1="200" y1="78" x2="200" y2="430" stroke="#4A90D9" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
<rect x="300" y="42" width="88" height="36" rx="5" ry="5" fill="#E09A52" opacity="0.18" stroke="#E09A52" stroke-width="1.5"/>
<text x="344" y="57" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#E09A52" text-anchor="middle">Control Plane</text>
<text x="344" y="71" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#E09A52" text-anchor="middle">API</text>
<line x1="344" y1="78" x2="344" y2="430" stroke="#E09A52" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
<rect x="460" y="42" width="88" height="36" rx="5" ry="5" fill="#52B366" opacity="0.18" stroke="#52B366" stroke-width="1.5"/>
<text x="504" y="57" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#52B366" text-anchor="middle">Agent</text>
<text x="504" y="71" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#52B366" text-anchor="middle">Runtime</text>
<line x1="504" y1="78" x2="504" y2="430" stroke="#52B366" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
<rect x="604" y="42" width="88" height="36" rx="5" ry="5" fill="#E05252" opacity="0.18" stroke="#E05252" stroke-width="1.5"/>
<text x="648" y="65" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#E05252" text-anchor="middle">新入请求</text>
<line x1="648" y1="78" x2="648" y2="430" stroke="#E05252" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
<text x="12" y="109" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">①</text>
<text x="12" y="144" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">②</text>
<text x="12" y="182" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">③</text>
<text x="12" y="219" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">④</text>
<text x="12" y="262" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">⑤</text>
<text x="12" y="302" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">⑥</text>
<text x="12" y="342" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">⑦</text>
<text x="12" y="382" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">⑧</text>
<text x="12" y="419" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">⑨</text>
<line x1="80" y1="105" x2="192" y2="105" stroke="#555" stroke-width="1.6" marker-end="url(#arr-gray)" />
<text x="136" y="100" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">点击"停用 Agent"按钮</text>
<line x1="208" y1="140" x2="336" y2="140" stroke="#4A90D9" stroke-width="1.6" marker-end="url(#arr-blue)" />
<text x="272" y="135" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">POST /confirm-action → 获取一次性 token（60s）</text>
<line x1="80" y1="178" x2="192" y2="178" stroke="#555" stroke-width="1.6" marker-end="url(#arr-gray)" />
<text x="136" y="173" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">确认对话框，点击"确认停用"</text>
<line x1="208" y1="215" x2="336" y2="215" stroke="#4A90D9" stroke-width="1.6" marker-end="url(#arr-blue)" />
<text x="272" y="210" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">PATCH /agents/{id}/status（携带 confirmation_token）</text>
<path d="M 352 258 C 376 258 376 288 352 288" stroke="#E09A52" stroke-width="1.6" fill="none" marker-end="url(#arr-orange)"/>
<text x="382" y="274" font-family="Arial, sans-serif" font-size="9.5" fill="#E09A52" text-anchor="start">数据库写入</text>
<text x="382" y="287" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="start">agent_config.status = SUSPENDED</text>
<line x1="352" y1="298" x2="496" y2="298" stroke="#E09A52" stroke-width="1.6" marker-end="url(#arr-orange)" />
<text x="424" y="293" font-family="Arial, sans-serif" font-size="10" fill="#E09A52" text-anchor="middle">POST /internal/agents/{id}/kill（HTTP，超时3s）</text>
<path d="M 512 338 C 536 338 536 368 512 368" stroke="#52B366" stroke-width="1.6" fill="none" marker-end="url(#arr-green)"/>
<text x="542" y="354" font-family="Arial, sans-serif" font-size="9.5" fill="#52B366" text-anchor="start">DashMap 写入 AgentStatus::Suspended</text>
<text x="542" y="367" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="start">&lt; 1ms</text>
<line x1="640" y1="378" x2="512" y2="378" stroke="#E05252" stroke-width="1.6" marker-end="url(#arr-red)" stroke-dasharray="6,3"/>
<text x="576" y="373" font-family="Arial, sans-serif" font-size="10" fill="#E05252" text-anchor="middle">发起请求（此后的新请求）</text>
<line x1="512" y1="415" x2="640" y2="415" stroke="#E05252" stroke-width="1.6" marker-end="url(#arr-red)" stroke-dasharray="6,3"/>
<text x="576" y="410" font-family="Arial, sans-serif" font-size="10" fill="#E05252" text-anchor="middle">返回拒绝响应 agent_suspended</text>
<rect x="24" y="95" width="5" height="268" rx="2" fill="#52B366" opacity="0.7"/>
<text x="22" y="256" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" transform="rotate(-90, 22, 256)">正常停用流程</text>
<rect x="24" y="368" width="5" height="57" rx="2" fill="#E09A52" opacity="0.7"/>
<text x="22" y="421" font-family="Arial, sans-serif" font-size="9" fill="#A0701A" text-anchor="middle" transform="rotate(-90, 22, 421)">停用生效验证</text>
<rect x="595" y="90" width="118" height="72" rx="5" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1"/>
<text x="601" y="106" font-family="Arial, sans-serif" font-size="9.5" fill="#444">端到端时延目标 &lt; 1s</text>
<text x="601" y="121" font-family="Arial, sans-serif" font-size="9" fill="#777">= 网络 RTT</text>
<text x="601" y="134" font-family="Arial, sans-serif" font-size="9" fill="#777">+ 数据库写入</text>
<text x="601" y="147" font-family="Arial, sans-serif" font-size="9" fill="#777">+ HTTP POST RTT</text>
<text x="601" y="160" font-family="Arial, sans-serif" font-size="9" fill="#777">+ DashMap 写入</text>
</svg>