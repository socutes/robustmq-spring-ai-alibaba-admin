  <ns0:text x="150" y="316" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="start">代码文件 + 测试文件 + 文档</ns0:text>
  <ns0:text x="150" y="332" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="start">具体到文件路径</ns0:text>
