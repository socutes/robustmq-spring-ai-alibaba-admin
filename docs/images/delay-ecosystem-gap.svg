  <rect x="20" y="394" width="940" height="80" fill="#F3EEFF" stroke="#8B5CF6" rx="8" stroke-width="1.5" />
  <text x="490" y="416" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#5B2DC0" text-anchor="middle">生态空白直接定义了机会：做一个「语言无关·独立部署·精确延时·高性能」的通用延时服务</text>
  <text x="490" y="436" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#666" text-anchor="middle">Go生态几乎空白 · Java碎片化 · Node/Ruby有标准但不通用 · 跨语言SDK是附加值</text>
  <text x="490" y="456" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#8B5CF6" text-anchor="middle">→ 服务端做好，SDK只是薄封装；这比各语言各自造轮子更有价值</text>
