  <rect x="209" y="72" width="181" height="7" fill="#8B5CF6" stroke="none" rx="4" stroke-width="0" />
  <rect x="209" y="75" width="181" height="4" fill="#8B5CF6" stroke="none" rx="0" stroke-width="0" />
