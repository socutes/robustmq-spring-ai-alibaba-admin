<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580">
  <rect width="980" height="580" fill="#FAFBFF" />
  <text x="490" y="34" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1A3A6B" text-anchor="middle">延时投递：五类方案全景</text>
  <text x="490" y="54" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">各有领地，各有边界——没有一个通用且独立且专注延时投递的事实标准</text>
  <rect x="20" y="72" width="181" height="390" fill="#EAF3FC" stroke="#4A90D9" rx="8" stroke-width="2" />
  <rect x="20" y="72" width="181" height="7" fill="#4A90D9" stroke="none" rx="4" stroke-width="0" />
  <rect x="20" y="75" width="181" height="4" fill="#4A90D9" stroke="none" rx="0" stroke-width="0" />
