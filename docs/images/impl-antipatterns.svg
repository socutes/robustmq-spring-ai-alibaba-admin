  <line x1="538" y1="87" x2="1012" y2="87" stroke="#EEE" stroke-width="1" />
  <text x="652" y="103" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">代码不好直接自己改，AI 当草稿机</text>
  <line x1="775" y1="87" x2="775" y2="125" stroke="#DDD" stroke-width="1" />
  <text x="897" y="103" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 反馈给 AI 让它改；改 CLAUDE.md 让下次写好</text>
  <rect x="20" y="137" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="20" y="137" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
  <rect x="265" y="137" width="245" height="60" fill="#fff" rx="0" />
