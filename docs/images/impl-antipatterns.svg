  <rect x="265" y="209" width="245" height="60" fill="#F0FFF0" rx="6" stroke="#52B366" stroke-width="1" />
  <rect x="20" y="209" width="245" height="60" fill="#fff" rx="0" />
  <text x="265" y="225" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#C00" text-anchor="middle">✗ 对话里反复加约束</text>
  <line x1="28" y1="231" x2="502" y2="231" stroke="#EEE" stroke-width="1" />
  <text x="142" y="247" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">每次新对话反复说"用 X 不用 Y"</text>
  <line x1="265" y1="231" x2="265" y2="269" stroke="#DDD" stroke-width="1" />
  <text x="387" y="247" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 约束写进 CLAUDE.md，自动加载，不重复</text>
  <rect x="530" y="209" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="530" y="209" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
  <rect x="775" y="209" width="245" height="60" fill="#fff" rx="0" />
  <rect x="775" y="209" width="245" height="60" fill="#F0FFF0" rx="6" stroke="#52B366" stroke-width="1" />
  <rect x="530" y="209" width="245" height="60" fill="#fff" rx="0" />
  <text x="775" y="225" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#C00" text-anchor="middle">✗ 任务中途变形</text>
  <line x1="538" y1="231" x2="1012" y2="231" stroke="#EEE" stroke-width="1" />
  <text x="652" y="247" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">做着做着改任务目标和验收</text>
  <line x1="775" y1="231" x2="775" y2="269" stroke="#DDD" stroke-width="1" />
  <text x="897" y="247" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 停下重拆，或追加新任务，契约不中途改</text>
  <rect x="275" y="281" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="275" y="281" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
