  <text x="246" y="610" text-anchor="middle" font-size="10" fill="#546e7a">Distributed lock</text>
  <text x="246" y="625" text-anchor="middle" font-size="10" fill="#546e7a">(Redisson)</text>
  <text x="246" y="641" text-anchor="middle" font-size="10" fill="#78909c">:6379</text>

