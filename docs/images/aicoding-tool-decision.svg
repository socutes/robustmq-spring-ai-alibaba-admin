<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <rect width="800" height="560" fill="#FAFBFF" />
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A90D9" />
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E09A52" />
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52B366" />
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999" />
    </marker>
  </defs>
  <text x="400" y="32" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="bold" fill="#1A3A6B" text-anchor="middle">新工具来了，要不要学？</text>
  <text x="400" y="52" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">三个问题，过滤 95% 的工具噪音</text>
  <circle cx="320" cy="80" r="26" fill="#4A90D9" />
  <text x="320" y="85" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">新工具出现</text>
  <polygon points="320,124 440,156 320,188 200,156" fill="#FAFBFF" stroke="#4A90D9" stroke-width="2" />
  <text x="320" y="148" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#4A90D9" text-anchor="middle">Q1</text>
  <text x="320" y="164" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#333" text-anchor="middle">它属于七层架构中的哪一层？</text>
  <line x1="320" y1="108" x2="320" y2="122" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr-b)" />
  <line x1="440" y1="156" x2="460" y2="156" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)" />
  <rect x="460" y="132" width="180" height="48" fill="#F4F4F4" stroke="#CCC" rx="8" stroke-width="1" />
  <text x="550" y="150" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">说不清楚</text>
  <text x="550" y="166" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">大概率是营销噪音，忽略</text>
  <polygon points="320,206 440,238 320,270 200,238" fill="#FAFBFF" stroke="#E09A52" stroke-width="2" />
  <text x="320" y="230" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#E09A52" text-anchor="middle">Q2</text>
  <text x="320" y="246" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#333" text-anchor="middle">在这一层比现有工具好在哪？</text>
  <line x1="320" y1="190" x2="320" y2="204" stroke="#E09A52" stroke-width="2" marker-end="url(#arr-o)" />
  <text x="330" y="201" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#E09A52" text-anchor="start">定位清晰</text>
  <line x1="440" y1="238" x2="460" y2="238" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)" />
  <rect x="460" y="214" width="180" height="48" fill="#F4F4F4" stroke="#CCC" rx="8" stroke-width="1" />
  <text x="550" y="232" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">说不出具体差异</text>
  <text x="550" y="248" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">小幅迭代，可选学</text>
  <polygon points="320,288 440,320 320,352 200,320" fill="#FAFBFF" stroke="#52B366" stroke-width="2" />
  <text x="320" y="312" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#52B366" text-anchor="middle">Q3</text>
  <text x="320" y="328" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#333" text-anchor="middle">你当下的场景需要它吗？</text>
  <line x1="320" y1="272" x2="320" y2="286" stroke="#52B366" stroke-width="2" marker-end="url(#arr-g)" />
  <text x="330" y="283" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#52B366" text-anchor="start">有明确差异</text>
  <line x1="440" y1="320" x2="460" y2="320" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)" />
  <rect x="460" y="296" width="180" height="48" fill="#F4F4F4" stroke="#CCC" rx="8" stroke-width="1" />
  <text x="550" y="314" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">暂时用不到</text>
  <text x="550" y="330" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#999" text-anchor="middle">加入观察列表</text>
  <line x1="320" y1="354" x2="320" y2="368" stroke="#52B366" stroke-width="2" marker-end="url(#arr-g)" />
  <text x="330" y="362" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#52B366" text-anchor="start">需要</text>
  <rect x="220" y="370" width="200" height="44" fill="#52B366" stroke="none" rx="22" stroke-width="0" />
  <text x="320" y="397" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">值得投入学习</text>
  <rect x="20" y="190" width="175" height="110" fill="#FFF0F0" stroke="#E05252" rx="8" stroke-width="1.5" />
  <text x="107" y="210" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#E05252" text-anchor="middle">结构性变化？立刻学！</text>
  <text x="107" y="230" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">改变某一层的基本玩法</text>
  <text x="107" y="248" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">例：MCP 改变了协议层</text>
  <text x="107" y="266" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">例：SDD 改变了方法论层</text>
  <text x="107" y="286" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#E05252" text-anchor="middle">—— 遇到立刻学，无需三问</text>
  <line x1="195" y1="245" x2="200" y2="220" stroke="#E05252" stroke-width="1.5" stroke-dasharray="5,3" />
</svg>