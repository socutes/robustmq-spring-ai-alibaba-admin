  <polyline points="490,285.0 515,285.0 515,172.0 690,172.0" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <polyline points="490,285.0 538,285.0 538,250.0 690,250.0" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <rect x="760" y="392" width="185" height="78" rx="6" fill="white" stroke="#D0D8EE" stroke-width="1"/>
  <text x="768" y="408" font-size="10" font-weight="bold" fill="#445">图例</text>
  <line x1="768" y1="422" x2="798" y2="422" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="804" y="426" font-size="9.5" fill="#555">依赖（实线）</text>
  <line x1="768" y1="442" x2="798" y2="442" stroke="#E09A52" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>
  <text x="804" y="446" font-size="9.5" fill="#555">调用关系（虚线）</text>
  <line x1="768" y1="460" x2="798" y2="460" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <text x="804" y="464" font-size="9.5" fill="#555">策略/审计调用（虚线）</text>
