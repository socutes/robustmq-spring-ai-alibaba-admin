  <text x="78" y="290" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">可执行清单，边界清晰</text>
  <rect x="56" y="312" width="348" height="44" fill="#fff" stroke="#B0CCE8" rx="6" stroke-width="1" />
