  <text x="514" y="432" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">MIT/Apache，社区驱动</text>
  <rect x="20" y="530" width="920" height="76" fill="#E8F8E8" stroke="#52B366" rx="8" stroke-width="1.5" />
  <text x="480" y="552" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#1A5A1A" text-anchor="middle">当这个空缺被填上，延时服务将成为继缓存、消息之后独立的第三类基础设施品类</text>
  <text x="480" y="574" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#3A7A3A" text-anchor="middle">正如 Redis 之于缓存、Kafka 之于流——延时服务可以有自己的事实标准</text>
  <text x="480" y="592" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#52B366" text-anchor="middle">现在没有一个开源项目同时满足这六条，RobustMQ 有机会是第一个</text>
