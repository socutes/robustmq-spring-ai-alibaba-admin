  <ns0:text x="150" y="220" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="start">说清楚 Why，让 AI 理解上下文</ns0:text>
