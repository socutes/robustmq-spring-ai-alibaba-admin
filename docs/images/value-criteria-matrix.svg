  <text x="100" y="360" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">积累能力</text>
  <rect x="180" y="306" width="190" height="90" fill="#fff" stroke="#E05252" rx="8" stroke-width="1.5" />
  <circle cx="202" cy="351" r="14" fill="#E05252" />
  <text x="202" y="356" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
  <text x="224" y="332" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">你的开源PR是你做的</text>
