  <rect x="275" y="281" width="245" height="60" fill="#fff" rx="0" />
  <text x="520" y="297" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#C00" text-anchor="middle">✗ 工具堆砌掩盖思考</text>
  <line x1="283" y1="303" x2="757" y2="303" stroke="#EEE" stroke-width="1" />
  <text x="397" y="319" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">装一堆工具但任务卡片没拆清楚</text>
  <line x1="520" y1="303" x2="520" y2="341" stroke="#DDD" stroke-width="1" />
  <text x="642" y="319" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 任务卡片没拆好，工具再多也白搭</text>
  <rect x="20" y="353" width="1020" height="58" fill="#F3EEFF" rx="8" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="530" y="371" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#5B2DC0" text-anchor="middle">核心原则：出了问题往上游找根因</text>
  <text x="530" y="389" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">AI 反复跑不对 → 改 CLAUDE.md 或任务卡片 · 不要逼 AI 在错误上下文里硬干</text>
  <text x="530" y="405" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#888" text-anchor="middle">修 Harness 成本很低，改一次以后所有类似任务都受益</text>
</svg>