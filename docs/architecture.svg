  <text x="893" y="368" text-anchor="middle" font-size="10" fill="#546e7a">OTel + Micrometer + ARMS · Kibana</text>

  <rect x="776" y="386" width="234" height="40" rx="7" fill="white" stroke="#b0bec5" stroke-width="1"/>
  <text x="893" y="401" text-anchor="middle" font-size="11" font-weight="700" fill="#37474f">Config Management</text>
  <text x="893" y="416" text-anchor="middle" font-size="10" fill="#546e7a">Nacos · Spring Config · YAML</text>

  <rect x="776" y="434" width="234" height="40" rx="7" fill="white" stroke="#b0bec5" stroke-width="1"/>
  <text x="893" y="449" text-anchor="middle" font-size="11" font-weight="700" fill="#37474f">Deployment</text>
  <text x="893" y="464" text-anchor="middle" font-size="10" fill="#546e7a">Docker Compose · Kubernetes (k8s)</text>

  <rect x="776" y="482" width="234" height="12" rx="4" fill="none"/>

  <!-- External Agents panel -->
  <rect x="756" y="520" width="274" height="80" rx="10" fill="#e0f7fa" stroke="#00838f" stroke-width="1.5" filter="url(#sh)"/>
  <text x="893" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#006064" letter-spacing="1">EXTERNAL AGENTS</text>
  <rect x="776" y="548" width="234" height="40" rx="7" fill="white" stroke="#80deea" stroke-width="1"/>
  <text x="893" y="563" text-anchor="middle" font-size="11" font-weight="700" fill="#00695c">Spring AI Alibaba Agents</text>
  <text x="893" y="578" text-anchor="middle" font-size="10" fill="#546e7a">push traces via OTLP · pull prompts via Nacos</text>

  <!-- ════════════════════════════════════════════════════
       ARROWS
  ════════════════════════════════════════════════════ -->

  <!-- Frontend → Backend (HTTP REST / SSE) -->
  <line x1="380" y1="198" x2="380" y2="222" stroke="#607d8b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="388" y="214" font-size="10" fill="#607d8b">HTTP / SSE</text>

  <!-- openapi → core -->
  <line x1="205" y1="334" x2="205" y2="350" stroke="#607d8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- start → core -->
  <line x1="531" y1="334" x2="531" y2="350" stroke="#607d8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- core → runtime -->
  <line x1="368" y1="432" x2="368" y2="448" stroke="#607d8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend → Middleware -->
  <line x1="368" y1="510" x2="368" y2="530" stroke="#607d8b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Middleware → Database -->
  <line x1="368" y1="680" x2="368" y2="700" stroke="#607d8b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Backend → External AI (right) -->
  <line x1="730" y1="310" x2="756" y2="230" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-ext)"/>
  <text x="738" y="300" font-size="10" fill="#9e9e9e">Spring AI</text>

  <!-- Backend → Infra box -->
  <line x1="730" y1="400" x2="756" y2="400" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-ext)"/>

  <!-- External agents → Nacos (left arrow into middleware) -->
  <line x1="756" y1="560" x2="730" y2="580" stroke="#00838f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- External agents → LoongCollector -->
  <line x1="756" y1="550" x2="714" y2="590" stroke="#00838f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════
       LAYER LABELS (left side)
  ════════════════════════════════════════════════════ -->
