  <text x="385" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">MySQL 8  (:3306)</text>
  <text x="385" y="768" text-anchor="middle" font-size="10" fill="#546e7a">prompt · prompt_version · dataset · dataset_version · dataset_item · evaluator · evaluator_version ·</text>
  <text x="385" y="783" text-anchor="middle" font-size="10" fill="#546e7a">experiment · experiment_result · model_config · user  (Druid pool · MyBatis-Plus ORM)</text>

