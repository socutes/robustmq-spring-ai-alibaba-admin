  <text x="488" y="274" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">绑定 RocketMQ，</text>
  <text x="488" y="286" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">不独立部署</text>
  <rect x="406" y="414" width="165" height="44" fill="#FFE8E8" stroke="#E05252" rx="4" stroke-width="1" />
  <text x="488" y="430" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#C03030" text-anchor="middle">方向对，但没有活下来的</text>
