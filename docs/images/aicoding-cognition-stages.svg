  <text x="450" y="58" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">绝大多数人卡在第二阶段，卡在这里的根源是把"学工具"等同于"用好工具"</text>
