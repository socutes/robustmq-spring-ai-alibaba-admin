  <text x="488" y="174" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">namoDB，社区停滞</text>
  <rect x="406" y="188" width="165" height="48" fill="#fff" stroke="#E05252" rx="4" stroke-width="1" />
