<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="440" viewBox="0 0 1060 440">
  <rect width="1060" height="440" fill="#FAFBFF" />
  <text x="530" y="30" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1A3A6B" text-anchor="middle">反模式：这些做法不允许</text>
  <text x="530" y="50" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">守住这些反模式，90% AI 完成是自然结果；守不住，数字凑出来也没有说服力</text>
  <rect x="20" y="65" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="20" y="65" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
