       LAYER 2 — BACKEND  (y 226 – 500)
  ════════════════════════════════════════════════════ -->
  <rect x="30" y="222" width="700" height="288" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="242" font-size="11" font-weight="700" fill="#2e7d32" letter-spacing="1">BACKEND  (Java 17 · Spring Boot 3.3 · port 8080)</text>

  <!-- server-openapi -->
  <rect x="50" y="252" width="310" height="82" rx="8" fill="white" stroke="#a5d6a7" stroke-width="1.2" filter="url(#sh)"/>
  <text x="205" y="272" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">server-openapi</text>
