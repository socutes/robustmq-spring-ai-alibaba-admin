  <text x="265" y="81" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#C00" text-anchor="middle">✗ AI 当自动补全</text>
  <line x1="28" y1="87" x2="502" y2="87" stroke="#EEE" stroke-width="1" />
  <text x="142" y="103" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#E05252" text-anchor="middle">敲两字让 AI 补几行，只改打字速度</text>
  <line x1="265" y1="87" x2="265" y2="125" stroke="#DDD" stroke-width="1" />
  <text x="387" y="103" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="7.5" font-weight="normal" fill="#2D7D2D" text-anchor="middle">✓ 把要做的事整理成任务卡片，让 AI 完整跑任务</text>
  <rect x="530" y="65" width="490" height="60" fill="#fff" rx="6" stroke="#CCC" stroke-width="1" />
  <rect x="530" y="65" width="245" height="60" fill="#FFF5F5" rx="6" stroke="#E05252" stroke-width="1" />
  <rect x="775" y="65" width="245" height="60" fill="#fff" rx="0" />
  <rect x="775" y="65" width="245" height="60" fill="#F0FFF0" rx="6" stroke="#52B366" stroke-width="1" />
