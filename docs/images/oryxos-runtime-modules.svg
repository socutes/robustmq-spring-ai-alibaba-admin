  <text x="750" y="64" text-anchor="middle" font-size="11" fill="#7A8AAA" font-style="italic">基础层</text>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A90D9">Agent Runtime — Crate 模块结构</text>
  <rect x="52" y="217" width="120" height="50" rx="6" fill="#00000012"/>
