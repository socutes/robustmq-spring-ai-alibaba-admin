<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="620" viewBox="0 0 400 620"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#455a64"/>
    </marker>
  </defs>

  <rect width="400" height="620" rx="12" fill="#f7f8fa"/>
  <text x="200" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1a237e">用户登录流程</text>

  <!-- 开始 -->
  <ellipse cx="200" cy="80" rx="60" ry="24" fill="#263238"/>
  <text x="200" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="white">开始</text>

  <line x1="200" y1="104" x2="200" y2="130" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 输入账号密码 -->
  <rect x="80" y="130" width="240" height="48" rx="8" fill="white" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="200" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#263238">输入用户名 / 密码</text>
  <text x="200" y="168" text-anchor="middle" font-size="10" fill="#78909c">POST /api/auth/login</text>

  <line x1="200" y1="178" x2="200" y2="208" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 校验 -->
  <polygon points="200,208 320,258 200,308 80,258" fill="white" stroke="#ff8f00" stroke-width="1.8"/>
  <text x="200" y="254" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">账号密码</text>
  <text x="200" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">正确？</text>

  <!-- 失败分支 -->
  <line x1="80" y1="258" x2="30" y2="258" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="54" y="248" text-anchor="middle" font-size="10" fill="#d32f2f">否</text>

  <line x1="30" y1="258" x2="30" y2="160" stroke="#455a64" stroke-width="1.8"/>
  <line x1="30" y1="160" x2="80" y2="160" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 失败提示 -->
  <rect x="2" y="262" width="56" height="28" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="30" y="281" text-anchor="middle" font-size="9" fill="#c62828">提示错误</text>

  <!-- 成功分支 -->
  <line x1="200" y1="308" x2="200" y2="348" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="214" y="334" font-size="10" fill="#2e7d32">是</text>

  <!-- 生成 JWT -->
  <rect x="80" y="348" width="240" height="48" rx="8" fill="white" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="200" y="369" text-anchor="middle" font-size="12" font-weight="700" fill="#263238">生成 JWT Token</text>
  <text x="200" y="385" text-anchor="middle" font-size="10" fill="#78909c">Argon2 校验 · jjwt 签发</text>

  <line x1="200" y1="396" x2="200" y2="426" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 返回 Token -->
  <rect x="80" y="426" width="240" height="48" rx="8" fill="white" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="200" y="447" text-anchor="middle" font-size="12" font-weight="700" fill="#263238">返回 Token 给前端</text>
  <text x="200" y="463" text-anchor="middle" font-size="10" fill="#78909c">前端存入 localStorage</text>

  <line x1="200" y1="474" x2="200" y2="504" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 跳转首页 -->
  <rect x="80" y="504" width="240" height="48" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="200" y="525" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">跳转首页</text>
  <text x="200" y="541" text-anchor="middle" font-size="10" fill="#78909c">后续请求携带 Token</text>

  <line x1="200" y1="552" x2="200" y2="578" stroke="#455a64" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 结束 -->
  <ellipse cx="200" cy="596" rx="60" ry="22" fill="#263238"/>
  <text x="200" y="601" text-anchor="middle" font-size="12" font-weight="700" fill="white">结束</text>
</svg>
