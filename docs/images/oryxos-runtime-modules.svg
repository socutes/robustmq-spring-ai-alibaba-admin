  <text x="750" y="335" text-anchor="middle" font-size="9.5" fill="#888">DashMap / 配额执行</text>
  <polyline points="170,240.0 270,240.0 270,145.0 370,145.0" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <polyline points="170,240.0 270,240.0 270,215.0 370,215.0" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <polyline points="170,240.0 270,240.0 270,285.0 370,285.0" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <polyline points="170,240.0 270,240.0 270,355.0 370,355.0" fill="none" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrBlue)"/>
