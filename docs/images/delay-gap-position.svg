  <text x="514" y="300" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="start">年级跨度</text>
  <text x="514" y="316" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">LSM 冷热分层，支持多年延时</text>
  <rect x="480" y="340" width="450" height="50" fill="#FFFFFF" stroke="#D0B8FF" rx="6" stroke-width="1" />
