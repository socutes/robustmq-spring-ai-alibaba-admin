  <text x="677" y="110" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#E09A52" text-anchor="middle">/调度平台</text>
  <rect x="595" y="132" width="165" height="48" fill="#fff" stroke="#E09A52" rx="4" stroke-width="1" />
  <text x="677" y="148" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#E09A52" text-anchor="middle">BullMQ</text>
  <text x="677" y="162" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#666" text-anchor="middle">Node.js 生态，</text>
