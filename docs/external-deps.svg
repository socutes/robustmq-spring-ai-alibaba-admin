<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" width="980" height="700"
     font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b8fa0"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0001"/>
    </filter>
    <!-- color palettes -->
    <!-- java: #1565c0 / #e3f2fd -->
    <!-- middleware: #e65100 / #fff3e0 -->
    <!-- api: #4a148c / #f3e5f5 -->
  </defs>

  <!-- ── background ── -->
  <rect width="980" height="700" fill="#f4f5f9" rx="14"/>

  <!-- ── title ── -->
  <text x="490" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Spring AI Alibaba Admin — 对外依赖全景图</text>
  <text x="490" y="55" text-anchor="middle" font-size="11" fill="#888">来源：pom.xml · application.yml · README</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- CENTER: 应用本身                              -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="380" y="285" width="220" height="110" rx="12" fill="#fff" stroke="#455a64" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="490" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#263238">Spring AI Alibaba</text>
  <text x="490" y="333" text-anchor="middle" font-size="14" font-weight="700" fill="#263238">Admin Server</text>
  <line x1="390" y1="345" x2="590" y2="345" stroke="#b0bec5" stroke-width="1"/>
  <text x="490" y="361" text-anchor="middle" font-size="10" fill="#546e7a">Spring Boot 3.3 · Java 17</text>
  <text x="490" y="375" text-anchor="middle" font-size="10" fill="#546e7a">端口 :8080 · /admin</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- LEFT: 关键 Java 依赖  (蓝色)                  -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="10" y="68" width="310" height="574" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="165" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#0d47a1">关键 Java 依赖</text>
  <line x1="20" y1="102" x2="310" y2="102" stroke="#90caf9" stroke-width="1"/>

  <!-- cards -->
  <!-- Spring AI Alibaba -->
  <rect x="24" y="112" width="282" height="66" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="131" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">Spring AI Alibaba Core</text>
  <text x="165" y="147" text-anchor="middle" font-size="9.5" fill="#1565c0">统一 ChatModel 适配层，对接 DashScope /</text>
  <text x="165" y="160" text-anchor="middle" font-size="9.5" fill="#1565c0">OpenAI / DeepSeek，提供 Prompt / VectorStore 抽象</text>
  <text x="165" y="172" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">v1.0.0.3 · spring-ai-alibaba-core</text>

  <!-- Spring AI -->
  <rect x="24" y="185" width="282" height="56" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="204" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">Spring AI BOM</text>
  <text x="165" y="219" text-anchor="middle" font-size="9.5" fill="#1565c0">Chat / Embedding / VectorStore / Tool Use /</text>
  <text x="165" y="232" text-anchor="middle" font-size="9.5" fill="#1565c0">PDF 文档读取 / ES 向量存储 核心抽象</text>
  <text x="165" y="240" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">v1.0.3</text>

  <!-- MyBatis-Plus -->
  <rect x="24" y="248" width="282" height="52" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">MyBatis-Plus</text>
  <text x="165" y="282" text-anchor="middle" font-size="9.5" fill="#1565c0">ORM 框架，提供 CRUD / 分页 / 条件构造，</text>
  <text x="165" y="295" text-anchor="middle" font-size="9.5" fill="#1565c0">驱动：mysql-connector-j + Druid 连接池</text>
  <text x="165" y="295" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>

  <!-- Redisson -->
  <rect x="24" y="307" width="282" height="48" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">Redisson</text>
  <text x="165" y="341" text-anchor="middle" font-size="9.5" fill="#1565c0">Redis 分布式锁 / 限流计数 / Token 缓存，</text>
  <text x="165" y="354" text-anchor="middle" font-size="9.5" fill="#1565c0">Spring Boot Starter 自动装配</text>

  <!-- JWT -->
  <rect x="24" y="362" width="282" height="44" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="381" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">JJWT</text>
  <text x="165" y="396" text-anchor="middle" font-size="9.5" fill="#1565c0">JWT 签发与验证（Argon2 哈希密码），</text>
  <text x="165" y="396" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>
  <text x="165" y="399" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">v0.12.6 · RSA 公私钥对签名</text>

  <!-- MCP SDK -->
  <rect x="24" y="413" width="282" height="44" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">MCP SDK</text>
  <text x="165" y="447" text-anchor="middle" font-size="9.5" fill="#1565c0">Model Context Protocol 工具调用，</text>
  <text x="165" y="459" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">io.modelcontextprotocol.sdk v0.9.0</text>

  <!-- GraalVM Polyglot -->
  <rect x="24" y="464" width="282" height="48" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="483" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">GraalVM Polyglot</text>
  <text x="165" y="498" text-anchor="middle" font-size="9.5" fill="#1565c0">沙箱执行 JS / Python 脚本（插件工具），</text>
  <text x="165" y="508" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">GraalVM SDK v24.2.1 · Truffle · Nashorn 备用</text>

  <!-- SpringDoc + Swagger -->
  <rect x="24" y="519" width="282" height="44" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="538" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">SpringDoc OpenAPI + Swagger Parser</text>
  <text x="165" y="553" text-anchor="middle" font-size="9.5" fill="#1565c0">自动生成接口文档，解析外部 Swagger/OAS 定义</text>
  <text x="165" y="556" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>

  <!-- JGraphT -->
  <rect x="24" y="570" width="282" height="44" rx="8" fill="#fff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="165" y="589" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">JGraphT + spring-ai-alibaba-graph-core</text>
  <text x="165" y="604" text-anchor="middle" font-size="9.5" fill="#1565c0">Workflow Agent 有向图编排与拓扑分析</text>
  <text x="165" y="607" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>

  <!-- ════════════════════════════════════════════ -->
  <!-- CENTER-BOTTOM: 中间件  (橙色)                 -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="350" y="430" width="280" height="252" rx="12" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="490" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">中间件</text>
  <line x1="360" y1="464" x2="620" y2="464" stroke="#ffcc80" stroke-width="1"/>

  <!-- MySQL -->
  <rect x="362" y="472" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="422" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">MySQL 8.0</text>
  <text x="422" y="506" text-anchor="middle" font-size="9.5" fill="#bf360c">主业务 DB</text>
  <text x="422" y="519" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:3306</text>

  <!-- Redis -->
  <rect x="498" y="472" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="558" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">Redis</text>
  <text x="558" y="506" text-anchor="middle" font-size="9.5" fill="#bf360c">缓存 / 分布式锁</text>
  <text x="558" y="519" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:6379</text>

  <!-- Elasticsearch -->
  <rect x="362" y="534" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="422" y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">Elasticsearch</text>
  <text x="422" y="568" text-anchor="middle" font-size="9.5" fill="#bf360c">向量检索 / Trace</text>
  <text x="422" y="581" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:9200 · v8.13</text>

  <!-- RocketMQ -->
  <rect x="498" y="534" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="558" y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">RocketMQ 5</text>
  <text x="558" y="568" text-anchor="middle" font-size="9.5" fill="#bf360c">异步任务队列</text>
  <text x="558" y="581" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:18080 gRPC</text>

  <!-- Nacos -->
  <rect x="362" y="596" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="422" y="616" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">Nacos</text>
  <text x="422" y="630" text-anchor="middle" font-size="9.5" fill="#bf360c">Prompt 配置中心</text>
  <text x="422" y="643" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:8848 · v2023.0.3</text>

  <!-- LoongCollector -->
  <rect x="498" y="596" width="120" height="54" rx="7" fill="#fff" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="558" y="612" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">LoongCollector</text>
  <text x="558" y="626" text-anchor="middle" font-size="9.5" fill="#bf360c">OTel Collector</text>
  <text x="558" y="640" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">:4318 OTLP HTTP</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- RIGHT: 外部 API  (紫色)                       -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="660" y="68" width="310" height="430" rx="12" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="815" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#4a148c">外部 API / 云服务</text>
  <line x1="670" y1="102" x2="960" y2="102" stroke="#ce93d8" stroke-width="1"/>

  <!-- DashScope -->
  <rect x="674" y="112" width="282" height="66" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">阿里云 DashScope</text>
  <text x="815" y="148" text-anchor="middle" font-size="9.5" fill="#6a1b9a">通义千问系列大模型（Chat / Embedding / Image），</text>
  <text x="815" y="161" text-anchor="middle" font-size="9.5" fill="#6a1b9a">通过 Spring AI Alibaba ChatModel 统一调用</text>
  <text x="815" y="173" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">api.dashscope.aliyuncs.com · 需配置 API Key</text>

  <!-- OpenAI -->
  <rect x="674" y="185" width="282" height="60" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">OpenAI API</text>
  <text x="815" y="220" text-anchor="middle" font-size="9.5" fill="#6a1b9a">GPT 系列模型，通过 spring-ai-openai 适配，</text>
  <text x="815" y="233" text-anchor="middle" font-size="9.5" fill="#6a1b9a">server-openapi 模块对外暴露兼容端点</text>
  <text x="815" y="240" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">需配置 OPENAI_API_KEY</text>

  <!-- DeepSeek -->
  <rect x="674" y="252" width="282" height="56" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">DeepSeek API</text>
  <text x="815" y="287" text-anchor="middle" font-size="9.5" fill="#6a1b9a">DeepSeek-Chat 等模型，REST 兼容 OpenAI 协议，</text>
  <text x="815" y="300" text-anchor="middle" font-size="9.5" fill="#6a1b9a">通过 model-config-deepseek.yaml 切换</text>
  <text x="815" y="302" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>

  <!-- Aliyun OSS -->
  <rect x="674" y="315" width="282" height="56" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">阿里云 OSS</text>
  <text x="815" y="350" text-anchor="middle" font-size="9.5" fill="#6a1b9a">知识库文档 / 文件上传存储，</text>
  <text x="815" y="363" text-anchor="middle" font-size="9.5" fill="#6a1b9a">aliyun-sdk-oss v3.17.4 调用</text>
  <text x="815" y="363" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic"></text>

  <!-- OTel / ARMS -->
  <rect x="674" y="378" width="282" height="56" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">阿里云 ARMS / OpenTelemetry</text>
  <text x="815" y="413" text-anchor="middle" font-size="9.5" fill="#6a1b9a">spring-ai-alibaba-autoconfigure-arms-observation</text>
  <text x="815" y="426" text-anchor="middle" font-size="9.5" fill="#6a1b9a">上报 Trace / Span，对接 ARMS 可观测平台</text>
  <text x="815" y="435" text-anchor="middle" font-size="9" fill="#90a4ae" font-style="italic">OTLP → LoongCollector → ES / ARMS</text>

  <!-- External Agent Apps -->
  <rect x="674" y="441" width="282" height="52" rx="8" fill="#fff" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="815" y="461" text-anchor="middle" font-size="11" font-weight="700" fill="#4a148c">外部 Agent 应用</text>
  <text x="815" y="476" text-anchor="middle" font-size="9.5" fill="#6a1b9a">引入 spring-ai-alibaba-agent-nacos，</text>
  <text x="815" y="489" text-anchor="middle" font-size="9.5" fill="#6a1b9a">通过 Nacos 动态拉取 Prompt，上报 OTLP Trace</text>

  <!-- ════════════════════════════════════════════ -->
