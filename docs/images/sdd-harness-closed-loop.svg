<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="510" viewBox="0 0 880 510">
  <rect width="880" height="510" fill="#FAFBFF" />
  <text x="440" y="34" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1A3A6B" text-anchor="middle">SDD + Harness = 完整闭环</text>
  <text x="440" y="54" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="normal" fill="#888" text-anchor="middle">SDD 告诉 AI 做什么，Harness 保证 AI 做对——少一个，另一个价值严重稀释</text>
  <rect x="40" y="80" width="380" height="300" fill="#EAF3FC" stroke="#4A90D9" rx="10" stroke-width="2" />
  <rect x="40" y="80" width="380" height="8" fill="#4A90D9" stroke="none" rx="5" stroke-width="0" />
