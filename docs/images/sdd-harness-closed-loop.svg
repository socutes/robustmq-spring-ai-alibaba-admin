  <rect x="476" y="204" width="348" height="44" fill="#fff" stroke="#E0C090" rx="6" stroke-width="1" />
  <text x="498" y="220" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#C07020" text-anchor="start">Plan Mode + Permission</text>
  <text x="498" y="236" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#666" text-anchor="start">前置规划 + 事前权限</text>
  <rect x="476" y="258" width="348" height="44" fill="#fff" stroke="#E0C090" rx="6" stroke-width="1" />
  <text x="498" y="274" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#C07020" text-anchor="start">Hooks</text>
