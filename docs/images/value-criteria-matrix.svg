  <rect x="380" y="306" width="190" height="90" fill="#fff" stroke="#8B5CF6" rx="8" stroke-width="1.5" />
  <circle cx="402" cy="351" r="14" fill="#8B5CF6" />
  <text x="402" y="356" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
  <text x="424" y="332" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">基于你真实项目积累</text>
  <text x="424" y="352" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">带你的踩坑和风格</text>
  <rect x="580" y="306" width="190" height="90" fill="#fff" stroke="#52B366" rx="8" stroke-width="1.5" />
  <circle cx="602" cy="351" r="14" fill="#52B366" />
  <text x="602" y="356" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
  <text x="624" y="332" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">用得越多越值钱</text>
  <text x="624" y="352" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#555" text-anchor="start">不依附公司持续增值</text>
  <text x="440" y="440" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="normal" fill="#AAA" text-anchor="middle">旧标尺（工具/年限/技术栈/大厂）只满足一条，随时间贬值——新立身之本三条全满足</text>
