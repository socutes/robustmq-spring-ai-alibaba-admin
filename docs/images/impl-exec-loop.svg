  <text x="740" y="476" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#E05252" text-anchor="start">✓ Commit 清晰</text>
  <text x="740" y="492" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="normal" fill="#555" text-anchor="start">每个 commit 说清做了什么，AI 代码占比可统计</text>
  <rect x="20" y="508" width="940" height="44" fill="#F0FFF0" rx="6" stroke="#52B366" stroke-width="1" />
  <text x="490" y="526" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="normal" fill="#2D7D2D" text-anchor="middle">Review 看什么：① 对不对（功能符合卡片）→ ② 质量（命名/错误处理/边界）→ ③ 测试（有无有价值的场景）→ ④ 集成影响</text>
  <text x="490" y="542" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="#E05252" text-anchor="middle">不允许：AI 写完不 Review 直接合并 · 空 Approval · 人重写 AI 的代码</text>
